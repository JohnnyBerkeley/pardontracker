<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trump Money Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent: #e74c3c;
    --accent2: #3498db;
    --gold: #f1c40f;
    --green: #2ecc71;
    --orange: #e67e22;
    --purple: #9b59b6;
    --radius: 8px;
    --sidebar-w: 240px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .stat {
    text-align: right;
  }
  .stat-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  nav {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px 0 24px;
  }
  .nav-section {
    padding: 12px 14px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 14px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    gap: 6px;
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .nav-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nav-btn .count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* ── Main content ── */
  main {
    flex: 1;
    overflow: auto;
    padding: 20px 24px;
  }

  .view-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .view-title {
    font-size: 18px;
    font-weight: 700;
  }
  .view-count {
    color: var(--text-dim);
    font-size: 13px;
  }
  .view-total {
    margin-left: auto;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }

  /* Search */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent2); }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: " ▲"; color: var(--accent2); }
  thead th.sort-desc::after { content: " ▼"; color: var(--accent2); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.expanded { background: var(--surface2); }

  td {
    padding: 10px 12px;
    vertical-align: top;
    max-width: 0;
  }

  .td-date { white-space: nowrap; color: var(--text-dim); font-size: 12px; width: 90px; }
  .td-amount {
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    text-align: right;
    width: 130px;
  }
  .td-amount.zero { color: var(--text-dim); font-weight: normal; }
  .td-who { font-weight: 500; }
  .td-title { font-weight: 500; }
  .td-title .title-text {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Expanded detail row */
  .detail-row td {
    padding: 0;
    background: #12151f;
    border-bottom: 2px solid var(--accent);
  }
  .detail-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    font-size: 13px;
  }
  .detail-inner.single { grid-template-columns: 1fr; }
  .detail-block h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .detail-block p { line-height: 1.6; color: var(--text); }
  .source-list { list-style: none; }
  .source-list li { margin-bottom: 4px; }
  .source-list a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 12px;
  }
  .source-list a:hover { text-decoration: underline; }
  .source-meta {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: 4px;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin: 1px 2px 1px 0;
    white-space: nowrap;
  }
  .badge-status-confirmed  { background: #1a4a2e; color: #2ecc71; }
  .badge-status-alleged    { background: #4a3000; color: #f1c40f; }
  .badge-status-suspected  { background: #2d1a4a; color: #9b59b6; }
  .badge-status-denied     { background: #3a1a1a; color: #e74c3c; }

  .badge-owed-private { background: #4a2000; color: #e67e22; }
  .badge-owed-govt    { background: #00294a; color: #3498db; }
  .badge-owed-both    { background: #2a004a; color: #9b59b6; }

  .badge-type-pardon      { background: #1a3a2a; color: #27ae60; }
  .badge-type-commutation { background: #2a2a00; color: #f1c40f; }
  .badge-type-mass_pardon { background: #3a0000; color: #e74c3c; }

  .badge-fin-yes  { background: #3a0000; color: #e74c3c; font-weight: 700; }
  .badge-fin-no   { background: #1a2a1a; color: #7f8c8d; }
  .badge-pol-yes  { background: #2a1a00; color: #e67e22; }

  .badge-qpq { background: #3a0000; color: #e74c3c; font-weight: 700; }

  .cat-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin: 1px 2px 1px 0;
    color: #fff;
    white-space: nowrap;
  }

  /* Beneficiary chips */
  .ben-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-dim);
    margin: 1px;
    white-space: nowrap;
    border: 1px solid var(--border);
  }

  /* Pardon-specific */
  .td-forgiven { font-weight: 700; text-align: right; white-space: nowrap; }
  .forgiven-total { color: var(--accent); }
  .forgiven-part  { color: var(--text-dim); font-size: 12px; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a5070; }

  @media (max-width: 768px) {
    nav { width: 180px; }
    .detail-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Trump Money Map <span>— Second Presidency, Jan 2025–</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val">42</div>
      <div class="stat-label">Incidents</div>
    </div>
    <div class="stat">
      <div class="stat-val">58</div>
      <div class="stat-label">Pardons</div>
    </div>
    <div class="stat">
      <div class="stat-val">$1.57B</div>
      <div class="stat-label">Pardons Forgiven</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="view-total-header"></div>
      <div class="stat-label">Current View</div>
    </div>
  </div>
</header>

<div class="app">
  <nav id="sidebar">
    <div class="nav-section">Incidents</div>
    <button class="nav-btn" onclick="showView('all-incidents')" id="btn-all-incidents">
      <span class="dot" style="background:#e74c3c"></span>

      <span class="count">42</span>

    <div id="cat-buttons"></div>

    <div class="nav-divider"></div>
    <div class="nav-section">Pardons</div>

      <span class="dot" style="background:#27ae60"></span>
      All Pardons
      <span class="count">58</span>
    </button>
    <button class="nav-btn" onclick="showView('pardons-financial')" id="btn-pardons-financial">
      <span class="dot" style="background:#e74c3c"></span>
      Financial Connection
    </button>
    <button class="nav-btn" onclick="showView('pardons-political')" id="btn-pardons-political">
      <span class="dot" style="background:#e67e22"></span>
      Political Connection
    </button>
    <button class="nav-btn" onclick="showView('pardons-private-victims')" id="btn-pardons-private-victims">
      <span class="dot" style="background:#e67e22"></span>
      Victims = Private
    </button>
    <button class="nav-btn" onclick="showView('pardons-govt')" id="btn-pardons-govt">
      <span class="dot" style="background:#3498db"></span>
      Victims = Taxpayers
    </button>
  </nav>

  <main>
    <div class="view-header">
      <div class="view-title" id="view-title">All Incidents</div>
      <div class="view-count" id="view-count"></div>
      <div class="view-total" id="view-total"></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search name, title, counterparty, offense…" oninput="applySearch()">
    </div>
    <div class="table-wrap">
      <div id="table-container"></div>
    </div>
  </main>
</div>

ANIA in the 2.5 minutes before Melania's Truth Social announcement — clear insider trading. Those wallets made ~$100M in profits. GD Culture Group, a small company with Chinese ties and no reported 2024 revenue, announced it would spend $300M on Bitcoin and $TRUMP via 'an unnamed entity in the British Virgin Islands.'", "categories": ["crypto_sales", "insider_trading", "foreign_investment"], "status": "confirmed", "beneficiary": ["trump_personally", "trump_crypto"], "counterparty": {"name": "24 anonymous insider wallets / GD Culture Group", "type": "foreign_individual", "country": "CN", "description": "Wallets with advance knowledge of launch; GD Culture Group is a Chinese-linked US company that announced $300M in Trump crypto purchases"}, "actors": ["Melania Trump", "24 anonymous wallets", "GD Culture Group", "Fight Fight Fight LLC"], "amount_usd": 100000000, "amount_note": "~$100M profit for insider wallets on $2.6M investment; GD Culture Group announced separate $300M in purchases", "financial_connection": {"exists": true, "description": "Insider buyers had advance knowledge of launch; Chinese-linked entity announced massive purchases of Trump crypto"}, "quid_pro_quo": {"alleged": true, "gave": "Advance notice of coin launch to select parties", "received": "Identity of insider recipients unknown"}, "sources": [{"title": "A group of anonymous traders scored a $100 million payday by buying Melania Trump's memecoin just before it launched", "url": "https://fortune.com/2025/05/07/melania-trump-memecoin-anonymous-traders-100-million-payday/", "date": "2025-05-07", "outlet": "Fortune", "type": "news"}], "tags": ["crypto", "melania", "insider_trading", "china", "GD_culture_group"], "last_updated": "2026-03-28"}, {"id": "fema-blue-state-denial-2025", "date": "2025-03-01", "date_end": null, "title": "FEMA approves 89% of red state disaster requests vs 23% of blue state requests", "summary": "Under Trump, Democratic-led states saw only 23% of disaster aid requests approved pac"], "counterparty": {"name": "NPR, PBS, Corporation for Public Broadcasting", "type": "media", "country": "US", "description": "US public broadcasters; CPB distributes federal funds to 1,500+ local TV and radio stations nationwide"}, "actors": ["Donald Trump", "Brendan Carr (FCC Chairman)", "Corporation for Public Broadcasting"], "amount_usd": 1070000000, "amount_note": "$1.07B in already-allocated CPB funding rescinded for FY2026–2027", "financial_connection": {"exists": false, "description": "No financial benefit to Trump — political retaliation against outlets perceived as critical"}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "How PBS, NPR lost funding — and bipartisan support — under Trump", "url": "https://www.npr.org/2025/07/18/nx-s1-5469920/pbs-npr-funding-rescission", "date": "2025-07-18", "outlet": "NPR", "type": "news"}, {"title": "Trump's FCC chief opens investigation into NPR and PBS", "url": "https://www.npr.org/2025/01/30/nx-s1-5281162/fcc-npr-pbs-investigation", "date": "2025-01-30", "outlet": "NPR", "type": "news"}], "tags": ["retaliation", "media", "NPR", "PBS", "FCC", "press_freedom"], "last_updated": "2026-03-28"}, {"id": "abc-settlement-trump-library-2025", "date": "2025-01-01", "date_end": "2025-03-01", "title": "ABC News pays $15M to Trump's presidential library — settled under FCC license threat", "summary": "Trump sued ABC News over George Stephanopoulos describing Trump as found liable for 'rape.' ABC settled for $15M to Trump's future presidential library — a direct personal financial benefit. Legal experts noted Disney (ABC's parent) was seeking FCC regulatory approvals simultaneously. The FCC under Brendan Carr threatened to revoke ABC and NBC broadcast licenses. Democratic lawmakers raised anti-bribery concerns about the settlement.", "categories": ["retaliation_targeting", "power_abuse", "state_damages"], "status": "confirmed", "beneficiary": ["trump_personally"], "counterparty": {"name": "ABC News / Disney", "type": "media", "country": "US", "description": "ABC settled defamation suit for $15M to Trump's library; FCC license threat was the coercive mechanism"}, "actors": ["Donald Trump", "George Stephanopoulos", "ABC News", "Disney", "Brendan Carr (FCC)"], "amount_usd": 15000000, "amount_note": "$15M paid to Trump presidential library — personal benefit to Trump", "financial_connection": {"exists": true, "description": "$15M paid directly to Trump's presidential library. FCC regulatory leverage over Disney's broadcast licenses was coercive mechanism."}, "quid_pro_quo": {"alleged": true, "gave": "Relief from FCC investigations and broadcast license revocation threats", "received": "$15M to Trump presidential library; no apology required"}, "sources": [{"title": "ABC, CBS settlements with Trump are a dangerous step toward commander in chief becoming editor-in-chief", "url": "https://theconversation.com/abcs-and-cbss-settlements-with-trump-are-a-dangerous-step-toward-the-commander-in-chief-becoming-editor-in-chief-261006", "date": "2025-08-01", "outlet": "The Conversation", "type": "news"}, {"title": "Trump's CBS lawsuit ties media freedom to FCC's regulatory power", "url": "https://www.brookings.edu/articles/trumps-cbs-lawsuit-ties-media-freedom-to-fccs-regulatory-power/", "date": "2025-07-01", "outlet": "Brookings Institution", "type": "watchdog"}], "tags": ["retaliation", "media", "ABC", "FCC", "settlement", "presidential_library"], "last_updated": "2026-03-28"}, {"id": "cbs-paramount-settlement-trump-library-2025-07", "date": "2025-07-02", "date_end": null, "title": "CBS/Paramount pays $16M to Trump library — FCC held merger approval as leverage", "summary": "Trump filed a $10B lawsuit (later $20B) against CBS over editing of a 60 Minutes Kamala Harris interview. Paramount settled for $16M to Trump's presidential library, no apology. The FCC simultaneously reviewed Skydance Media's acquisition of Paramount — a deal Brendan Carr could block. Democratic lawmakers called the settlement a potential violation of anti-bribery laws; the payment went directly to Trump personally (his library).", "categories": ["retaliation_targeting", "power_abuse", "state_damages"], "status": "confirmed", "beneficiary": ["trump_personally"], "counterparty": {"name": "CBS News / Paramount Global", "type": "media", "country": "US", "description": "CBS parent Paramount needed FCC approval for Skydance acquisition — approval FCC Chair Carr could withhold"}, "actors": ["Donald Trump", "CBS News", "Paramount Global", "Skydance Media", "Brendan Carr (FCC)"], "amount_usd": 16000000, "amount_note": "$16M to Trump presidential library; merger approval worth billions to Paramount", "financial_connection": {"exists": true, "description": "$16M paid directly to Trump's library. FCC merger approval was the coercive lever."}, "quid_pro_quo": {"alleged": true, "gave": "FCC approval of Skydance-Paramount merger", "received": "$16M to Trump presidential library"}, "sources": [{"title": "Paramount settles Trump's '60 Minutes' lawsuit with $16 million payout and no apology", "url": "https://www.cnn.com/2025/07/02/media/cbs-trump-60-minutes-paramount-settlement", "date": "2025-07-02", "outlet": "CNN", "type": "news"}, {"title": "Trump's CBS lawsuit ties media freedom to FCC's regulatory power", "url": "https://www.brookings.edu/articles/trumps-cbs-lawsuit-ties-media-freedom-to-fccs-regulatory-power/", "date": "2025-07-01", "outlet": "Brookings Institution", "type": "watchdog"}], "tags": ["retaliation", "media", "CBS", "FCC", "Paramount", "merger_approval", "presidential_library"], "last_updated": "2026-03-28"}, {"id": "perkins-coie-executive-order-2025-03", "date": "2025-03-06", "date_end": "2025-06-27", "title": "Perkins Coie targeted by executive order for Clinton 2016 work — courts strike it down", "summary": "Trump issued Executive Order 14230 targeting Perkins Coie LLP for having worked for Hillary Clinton's 2016 campaign and commissioning Steele dossier research. The order suspended security clearances, barred employees from federal buildings, and directed contract termination. Courts immediately blocked it and ultimately ruled it unconstitutional on First, Fifth, and Sixth Amendment grounds. Perkins Coie was one of four firms that fought back and won; at least nine other firms capitulated and paid $40M–$125M each in coerced 'free legal services.'", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_personally"], "counterparty": {"name": "Perkins Coie LLP", "type": "law_firm", "country": "US", "description": "Major US law firm targeted for Clinton 2016 work; fought the executive order and won full injunction"}, "actors": ["Donald Trump", "Perkins Coie LLP"], "amount_usd": null, "amount_note": "Perkins Coie resisted and won. Nine+ other firms that capitulated paid $40M–$125M each.", "financial_connection": {"exists": false, "description": "Retaliation against firm for past political work — no direct financial benefit to Trump"}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Targeting of law firms and lawyers under the second Trump administration — Wikipedia", "url": "https://en.wikipedia.org/wiki/Targeting_of_law_firms_and_lawyers_under_the_second_Trump_administration", "date": "2025-07-01", "outlet": "Wikipedia", "type": "reference"}, {"title": "In back-to-back rulings, federal judges rule against Trump orders targeting law firms", "url": "https://www.npr.org/2025/03/28/g-s1-56890/law-firms-sue-trump", "date": "2025-03-28", "outlet": "NPR", "type": "news"}], "tags": ["retaliation", "law_firms", "executive_order", "Clinton", "Steele_dossier", "unconstitutional"], "last_updated": "2026-03-28"}, {"id": "wilmerhale-jenner-block-executive-orders-2025-03", "date": "2025-03-27", "date_end": "2025-06-27", "title": "WilmerHale and Jenner & Block targeted for hiring Mueller prosecutors — courts block orders", "summary": "Trump targeted WilmerHale for hiring Robert Mueller and his colleagues, and Jenner & Block for hiring lead Mueller prosecutor Andrew Weissman. Both firms sued immediately. Courts issued emergency blocks and struck both orders down as unconstitutional — the explicit reason for targeting (employing prosecutors who investigated Trump) made the retaliatory motive unusually transparent.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_personally"], "counterparty": {"name": "WilmerHale LLP / Jenner & Block LLP", "type": "law_firm", "country": "US", "description": "Law firms targeted for employing Robert Mueller and Andrew Weissman after the special counsel investigation"}, "actors": ["Donald Trump", "WilmerHale LLP", "Jenner & Block LLP", "Robert Mueller", "Andrew Weissman"], "amount_usd": null, "amount_note": "Both firms resisted and won. Firms that capitulated paid $40M–$125M each in coerced legal work.", "financial_connection": {"exists": false, "description": "Personal retaliation for employing lawyers who investigated Trump — no direct financial benefit"}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Judges temporarily block Trump orders targeting Jenner and Block, WilmerHale law firms", "url": "https://abcnews.go.com/Politics/law-firm-targeted-trump-jenner-block-suing-block/story?id=120256937", "date": "2025-03-28", "outlet": "ABC News", "type": "news"}, {"title": "Judge strikes down executive order targeting WilmerHale", "url": "https://www.cnn.com/2025/05/27/politics/law-firms-wilmerhale-executive-order", "date": "2025-05-27", "outlet": "CNN", "type": "news"}], "tags": ["retaliation", "law_firms", "Mueller", "Weissman", "executive_order", "unconstitutional"], "last_updated": "2026-03-28"}, {"id": "harvard-funding-freeze-2025-04", "date": "2025-04-14", "date_end": null, "title": "Harvard: $2.2B frozen after rejecting Trump demands — judge rules cuts 'illegal retaliation'", "summary": "The Trump administration froze $2.2 billion in Harvard grants after Harvard publicly refused to comply with demands to eliminate DEI programs, screen international students for ideology, and submit to federal curriculum oversight. A federal judge later ruled the cuts were 'illegal retaliation' for Harvard's refusal to cede institutional governance. Harvard was the only major university to fully refuse; Columbia paid $200M+ to settle and regain funding.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_pac"], "counterparty": {"name": "Harvard University", "type": "university", "country": "US", "description": "Harvard refused Trump's DEI and governance demands; became primary target; federal judge found the funding cuts illegally retaliatory"}, "actors": ["Donald Trump", "Linda McMahon (Education Secretary)", "Harvard University", "President Alan Garber"], "amount_usd": 2200000000, "amount_note": "$2.2B frozen; total $8.7B in Harvard federal funding reviewed; judge ruled cuts illegal", "financial_connection": {"exists": false, "description": "No direct financial benefit to Trump — coercive use of federal funding to control private institution"}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Harvard has $2.2 billion in grants frozen by Trump administration after rejecting demands", "url": "https://www.cnbc.com/2025/04/14/trump-harvard-deal-funding-billion-dei.html", "date": "2025-04-14", "outlet": "CNBC", "type": "news"}, {"title": "Judge reverses Trump administration's cuts of billions in research funding to Harvard", "url": "https://www.pbs.org/newshour/politics/judge-reverses-trump-administrations-cuts-of-billions-in-research-funding-to-harvard", "date": "2025-09-01", "outlet": "PBS NewsHour", "type": "news"}, {"title": "Trump's Higher Education Crackdown at Year One", "url": "https://www.universityherald.com/articles/80253/20260326/trumps-higher-education-crackdown-year-one-what-has-stuck-what-has-collapsed-what-still.htm", "date": "2026-03-26", "outlet": "University Herald", "type": "news"}], "tags": ["retaliation", "university", "Harvard", "DEI", "research_funding", "academic_freedom"], "last_updated": "2026-03-28"}, {"id": "columbia-settlement-2025-03", "date": "2025-03-07", "date_end": "2025-06-01", "title": "Columbia: $400M cut then capitulates with $200M+ settlement — becomes warning to other universities", "summary": "The Trump administration cut $400M in Columbia's federal funding on March 7, 2025, citing antisemitism concerns. Columbia subsequently paid $200M+ to settle and regain access to research funding, agreeing to federal oversight conditions. Columbia's capitulation became the model — and warning — for other universities: comply or lose funding. Harvard chose the other path and fought back, winning in court.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_pac"], "counterparty": {"name": "Columbia University", "type": "university", "country": "US", "description": "Columbia capitulated to Trump demands after $400M cut, paying $200M+ and accepting federal oversight — the first major university to do so"}, "actors": ["Donald Trump", "Linda McMahon (Education Secretary)", "Columbia University"], "amount_usd": 400000000, "amount_note": "$400M cut initially; $200M+ settlement paid to regain funding", "financial_connection": {"exists": false, "description": "No direct financial benefit to Trump — coercive model of funding denial and compliance"}, "quid_pro_quo": {"alleged": false, "gave": "Restoration of some federal research funding", "received": "$200M+ from Columbia; agreement to federal governance oversight"}, "sources": [{"title": "Trump Threatened Harvard's and Columbia's Funding. A Year Later, Only Harvard Is Still Fighting.", "url": "https://www.columbiaspectator.com/the-eye/2026/03/13/trump-threatened-harvards-and-columbias-funding-a-year-later-only-harvard-is-still-fighting/", "date": "2026-03-13", "outlet": "Columbia Spectator", "type": "news"}, {"title": "Trump brings elite institutions to heel in $1.2 billion settlement spree", "url": "https://www.axios.com/2025/07/30/trump-harvard-settlement-dei-lawsuit", "date": "2025-07-30", "outlet": "Axios", "type": "news"}], "tags": ["retaliation", "university", "Columbia", "DEI", "research_funding", "settlement"], "last_updated": "2026-03-28"}, {"id": "big-tech-inauguration-donations-praise-2025-01", "date": "2025-01-07", "date_end": "2025-01-20", "title": "Big Tech donates $1M each to inauguration fund and publicly praises Trump — antitrust cases pending", "summary": "Meta, Amazon, Google, Microsoft, Apple (CEO Tim Cook personally), and OpenAI's Sam Altman each donated $1 million to Trump's inauguration fund. Amazon also streamed the ceremony on Prime (in-kind $1M). CEOs made public praise statements: Altman said 'President Trump will lead our country into the age of AI'; Microsoft CEO thanked Trump for 'putting policies in place for the US to lead in AI.' All of these companies faced or faced possible antitrust, regulatory, or tariff exposure under the new administration.", "categories": ["public_praise", "selling_access"], "status": "confirmed", "beneficiary": ["trump_pac"], "counterparty": {"name": "Meta, Amazon, Google, Microsoft, Apple, OpenAI", "type": "domestic_company", "country": "US", "description": "Major tech companies, each with significant regulatory exposure (antitrust, AI policy, content moderation) before the Trump administration"}, "actors": ["Mark Zuckerberg (Meta)", "Jeff Bezos (Amazon)", "Sundar Pichai (Google)", "Satya Nadella (Microsoft)", "Tim Cook (Apple)", "Sam Altman (OpenAI)", "Donald Trump"], "amount_usd": 7000000, "amount_note": "$1M cash donation each from Meta, Amazon, Google, Microsoft; $1M personal donation from Tim Cook; $1M personal from Sam Altman; Amazon additional $1M in-kind streaming. Total ~$7M+ from tech sector.", "financial_connection": {"exists": true, "description": "Donations coincided with each company facing potential antitrust, AI regulation, or tariff exposure. Meta faced active FTC antitrust lawsuit. Google faced DOJ antitrust case. All sought favorable regulatory environment."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable regulatory environment, antitrust relief, AI policy support, tariff exemptions", "received": "$7M+ in inauguration donations; public praise from tech CEOs; political alignment"}, "sources": [{"title": "Google, Microsoft, Meta, Apple: Big Tech companies and CEOs donating millions to the Trump inauguration", "url": "https://www.fastcompany.com/91257772/trump-inauguration-big-tech-donations-list-google-microsoft-meta-apple", "date": "2025-01-09", "outlet": "Fast Company", "type": "news"}, {"title": "Big Tech bent the knee for Trump in 2025", "url": "https://www.engadget.com/general/big-tech-bent-the-knee-for-trump-in-2025-140000365.html", "date": "2025-12-31", "outlet": "Engadget", "type": "news"}, {"title": "Trump inauguration donors include Meta, Amazon, Target, Delta, Ford", "url": "https://www.cnbc.com/2025/04/23/trump-inauguration-donors-include-meta-amazon-target-delta-ford.html", "date": "2025-04-23", "outlet": "CNBC", "type": "news"}, {"title": "Tech moguls Altman, Bezos and Zuckerberg donate to Trump's inauguration fund", "url": "https://www.npr.org/2024/12/13/nx-s1-5227874/trump-bezos-zuckerberg-amazon-facebook-open-ai-meta-inauguration-fund", "date": "2024-12-13", "outlet": "NPR", "type": "news"}], "tags": ["public_praise", "big_tech", "inauguration", "antitrust", "Meta", "Google", "Amazon", "Apple", "OpenAI", "Microsoft"], "last_updated": "2026-03-28"}, {"id": "meta-zuckerberg-fact-checkers-antitrust-2025-01", "date": "2025-01-07", "date_end": "2025-11-18", "title": "Meta kills fact-checkers, pays Trump $25M, wins antitrust case — Zuckerberg courts Trump throughout", "summary": "On January 7, 2025 — two weeks before inauguration — Meta eliminated its US fact-checking program, drawing immediate praise from Trump ('Probably' responding to Trump's pressure, Trump said). Meta also paid Trump $25M to settle his lawsuit over the post-Jan.6 Facebook suspension. Meta then won a landmark FTC antitrust case in November 2025. Trump said he'd 'probably' influenced Zuckerberg's fact-checker decision. Zuckerberg visited Mar-a-Lago to lobby Trump directly and donated $1M to the inauguration.", "categories": ["public_praise", "selling_access", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_personally", "trump_pac"], "counterparty": {"name": "Meta / Mark Zuckerberg", "type": "domestic_company", "country": "US", "description": "Meta faced active FTC antitrust suit over Instagram and WhatsApp acquisitions; Zuckerberg pursued comprehensive appeasement strategy"}, "actors": ["Mark Zuckerberg", "Meta", "Donald Trump", "FTC"], "amount_usd": 26000000, "amount_note": "$25M settlement of Trump's Facebook ban lawsuit + $1M inauguration donation = $26M total to Trump", "financial_connection": {"exists": true, "description": "$25M paid directly to Trump personally (lawsuit settlement). Meta won landmark antitrust ruling in November 2025 after year of courting Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable antitrust environment; FTC case effectively neutralized; no new content moderation mandates", "received": "$25M lawsuit settlement; $1M inauguration donation; fact-checker elimination (political win); public praise"}, "sources": [{"title": "Meta ends fact-checking, drawing praise from Trump", "url": "https://www.washingtonpost.com/technology/2025/01/07/meta-factchecking-zuckerberg/", "date": "2025-01-07", "outlet": "Washington Post", "type": "news"}, {"title": "Meta scraps fact-checking, brings back political content in latest Trump-friendly move", "url": "https://www.cnbc.com/2025/01/07/meta-eliminates-third-party-fact-checking-moves-to-community-notes.html", "date": "2025-01-07", "outlet": "CNBC", "type": "news"}, {"title": "Zuckerberg's Meta Triumphs Over Trump: antitrust win November 2025", "url": "https://www.bloomberg.com/news/newsletters/2025-11-18/zuckerberg-s-meta-triumphs-over-trump-evening-briefing-americas", "date": "2025-11-18", "outlet": "Bloomberg", "type": "news"}, {"title": "How CEOs deal with Trump: Praise, face time, remorse, and gifts made of gold all go a long way", "url": "https://fortune.com/2025/08/13/how-ceos-deal-with-trump-praise-face-time-remorse-and-gifts-made-of-gold-all-go-a-long-way-experience-shows/", "date": "2025-08-13", "outlet": "Fortune", "type": "news"}], "tags": ["public_praise", "Meta", "Zuckerberg", "antitrust", "fact_checkers", "settlement", "Mar_a_Lago"], "last_updated": "2026-03-28"}, {"id": "foreign-leaders-flattery-gifts-2025", "date": "2025-01-20", "date_end": null, "title": "Foreign leaders adopt 'flattery diplomacy' — gifts, Nobel nominations, golden crowns", "summary": "Foreign leaders systematically adopted flattery as a diplomatic tool to manage Trump. Notable gifts and acts of praise: Netanyahu brought Trump a letter nominating him for the Nobel Peace Prize ('well deserved, you should get it'); South Korea's President gave Trump a golden crown replica and the country's highest honor; a Swiss delegation gave a gold bar; the UK's Keir Starmer gave a personal state visit invitation from King Charles III. Qatar gave a $400M Boeing 747. Trump hosted 40+ foreign heads of government in 2025 — more than double Biden's first-year total.", "categories": ["public_praise", "foreign_gift", "selling_access"], "status": "confirmed", "beneficiary": ["trump_personally"], "counterparty": {"name": "Multiple foreign governments — Qatar, South Korea, Switzerland, UK, Israel", "type": "foreign_government", "country": "XX", "description": "Foreign governments competing to flatter Trump to gain diplomatic access and favorable policy treatment"}, "actors": ["Benjamin Netanyahu (Israel)", "Lee Jae Myung (South Korea)", "Keir Starmer (UK)", "Swiss delegation", "Donald Trump"], "amount_usd": null, "amount_note": "Gold bar, golden crown, Nobel nomination letter — individual values not disclosed. Qatar plane ($400M) tracked separately.", "financial_connection": {"exists": true, "description": "Gold bar and golden crown have direct monetary value. Nobel nomination letter has no monetary value but significant political value to Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable diplomatic treatment, policy concessions, arms deals, trade deals", "received": "Gifts, flattery, public praise, honorary titles from foreign governments"}, "sources": [{"title": "Charming Trump: The 'flattery diplomacy' displays of 2025", "url": "https://www.france24.com/en/americas/20251230-flattering-trump-a-2025-retrospective", "date": "2025-12-30", "outlet": "France 24", "type": "news"}, {"title": "Art of the praise: Why flattering Trump is now the go-to diplomatic move", "url": "https://www.npr.org/2025/08/02/nx-s1-5489704/praise-trump-flattery", "date": "2025-08-02", "outlet": "NPR", "type": "news"}, {"title": "Want to win over Trump? Asian leaders see flattery as the magic ingredient", "url": "https://www.aljazeera.com/news/2025/10/30/want-to-win-over-trump-asian-leaders-see-flattery-as-the-magic-ingredient", "date": "2025-10-30", "outlet": "Al Jazeera", "type": "news"}, {"title": "Tracker: The gifts Trump has received from foreign leaders in 2025", "url": "https://edition.cnn.com/politics/gift-tracker-trump-foreign-leaders-vis", "date": "2025-12-01", "outlet": "CNN", "type": "news"}], "tags": ["public_praise", "foreign_gift", "flattery_diplomacy", "Netanyahu", "South_Korea", "Switzerland", "UK", "Nobel"], "last_updated": "2026-03-28"}, {"id": "tariff-exemptions-politically-connected-2025-04", "date": "2025-04-01", "date_end": null, "title": "Politically connected firms win secret tariff exemptions — no formal application process", "summary": "After Trump's sweeping tariffs, ProPublica found that politically connected firms were winning carve-outs through opaque back-channel lobbying — with no formal application process. Reyes Holdings (a Coca-Cola bottler owned by major Republican donors) hired Ballard Partners (founded by Trump fundraiser Brian Ballard) and won an exemption for PET resin plastic. Industry experts said they could not explain why certain products were exempted. The lack of transparency created conditions where political connections, not economic rationale, determined who paid tariffs.", "categories": ["public_praise", "selling_access", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_pac"], "counterparty": {"name": "Reyes Holdings / Ballard Partners and other politically connected firms", "type": "domestic_company", "country": "US", "description": "Republican mega-donor owned companies winning secret tariff exemptions through Trump-connected lobbyists"}, "actors": ["Donald Trump", "Reyes Holdings", "Brian Ballard", "Ballard Partners", "Commerce Department"], "amount_usd": null, "amount_note": "Value of exemptions not disclosed; tariffs ranged 10–145% on affected goods — exemptions worth potentially billions across all recipients", "financial_connection": {"exists": true, "description": "Firms that donated to Republicans and hired Trump-connected lobbyists received tariff exemptions worth potentially billions. No public criteria for exemptions."}, "quid_pro_quo": {"alleged": true, "gave": "Tariff exemptions worth potentially billions to connected firms", "received": "Political donations, lobbying fees to Trump-connected firms, public support"}, "sources": [{"title": "Politically Connected Firms Benefit From Trump Tariff Exemptions Amid Secrecy, Confusion", "url": "https://www.propublica.org/article/trump-tariffs-exemptions-pet-lobbyists-asbestos-confusion-secrecy", "date": "2025-04-22", "outlet": "ProPublica", "type": "news"}, {"title": "Trump Loves Tariffs, Just Not for the Rich and Well-Connected", "url": "https://www.citizen.org/article/trump-loves-tariffs-just-not-for-the-rich-and-well-connected/", "date": "2025-05-01", "outlet": "Public Citizen", "type": "watchdog"}], "tags": ["public_praise", "tariff_exemptions", "lobbyists", "donors", "selling_access", "secrecy"], "last_updated": "2026-03-28"}, {"id": "trump-tech-dinner-sept-2025", "date": "2025-09-05", "date_end": null, "title": "Trump hosts 33 Silicon Valley CEOs at White House dinner — mass public praise follows", "summary": "Trump hosted a high-profile tech dinner at the White House with 33 Silicon Valley executives including leaders from AMD, Microsoft, and others. CEOs issued public praise: AMD's CEO praised Trump for 'supporting the semiconductor industry'; Microsoft's CEO thanked Trump for AI policy. The dinner underscored Silicon Valley's strategic realignment — companies sought favorable AI regulation, semiconductor policy, and government contracts while publicly aligning with the administration.", "categories": ["public_praise", "selling_access"], "status": "confirmed", "beneficiary": ["trump_personally", "trump_pac"], "counterparty": {"name": "33 Silicon Valley tech executives", "type": "domestic_company", "country": "US", "description": "Senior tech executives from semiconductor, AI, and platform companies seeking favorable regulatory and policy treatment"}, "actors": ["Donald Trump", "AMD CEO Lisa Su", "Microsoft CEO Satya Nadella", "33 tech executives total"], "amount_usd": null, "amount_note": "Access dinner — no direct financial transaction, but part of broader pattern of political alignment in exchange for regulatory favor", "financial_connection": {"exists": true, "description": "Executives sought favorable AI regulation, semiconductor policy, and government contracts. Public praise was the visible currency."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable AI and semiconductor policy; government contracts; regulatory relief", "received": "Public praise for Trump from 33 tech industry leaders; political legitimacy"}, "sources": [{"title": "Trump hosts Big Tech elite at White House dinner: CEOs praise president", "url": "https://www.axios.com/2025/09/05/trump-tech-dinner-ceo-zuckerberg-musk", "date": "2025-09-05", "outlet": "Axios", "type": "news"}, {"title": "Meet all 33 Silicon Valley power players at Trump's high-profile tech dinner", "url": "https://fortune.com/2025/09/05/trump-tech-dinner-full-attendee-list/", "date": "2025-09-05", "outlet": "Fortune", "type": "news"}, {"title": "How CEOs deal with Trump: Praise, face time, remorse, and gifts made of gold all go a long way", "url": "https://fortune.com/2025/08/13/how-ceos-deal-with-trump-praise-face-time-remorse-and-gifts-made-of-gold-all-go-a-long-way-experience-shows/", "date": "2025-08-13", "outlet": "Fortune", "type": "news"}], "tags": ["public_praise", "big_tech", "Silicon_Valley", "AI_policy", "semiconductors", "White_House_dinner"], "last_updated": "2026-03-28"}, {"id": "mtg-tariff-stock-trades-2025-04", "date": "2025-04-07", "date_end": "2025-04-09", "title": "Rep. Marjorie Taylor Greene buys $21K–$315K in stocks during tariff crash — day before pause", "summary": "Rep. Marjorie Taylor Greene (R-GA) bought $21,000–$315,000 in stocks on April 7–9, 2025 — during the market crash triggered by Trump's Liberation Day tariffs — including the day before Trump announced the tariff pause that sent markets surging. She also dumped $50K–$100K in Treasury bills the day before the reversal. Additionally, Greene bought up to $30,000 of Palantir stock the week before Palantir signed a $30M ICE contract; Greene sits on the House Homeland Security Committee overseeing ICE. No criminal charges — no member of Congress has ever been prosecuted under the STOCK Act.", "categories": ["insider_trading"], "status": "alleged", "beneficiary": ["trump_pac"], "counterparty": {"name": "Rep. Marjorie Taylor Greene (R-GA)", "type": "congress_member", "country": "US", "description": "Close Trump ally on House Homeland Security Committee; made well-timed trades around tariff announcements and before Palantir ICE contract"}, "actors": ["Rep. Marjorie Taylor Greene", "Donald Trump", "Palantir Technologies", "ICE"], "amount_usd": 315000, "amount_note": "$21K–$315K in stock purchases (STOCK Act range disclosure); $50K–$100K in Treasury bills sold. Palantir stake: up to $30K before $30M ICE contract.", "financial_connection": {"exists": true, "description": "Trades made during crash window before Trump pause; Palantir trade made before ICE contract announcement Greene's committee oversees."}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "The List of Lawmakers Who Made Stock Trades Around Trump's Tariff Announcements Is Growing", "url": "https://www.notus.org/congress/trump-tariff-stock-trades", "date": "2025-04-20", "outlet": "NOTUS", "type": "news"}, {"title": "Marjorie Taylor Greene faces 'insider trading' probe calls over stock buys", "url": "https://www.newsweek.com/marjorie-taylor-greene-faces-calls-insider-trading-probe-stock-buys-donald-trump-tariffs-2058469", "date": "2025-04-15", "outlet": "Newsweek", "type": "news"}, {"title": "Watchdog: Rep. MTG's Stock Trades In Semiconductor Companies Suspiciously Preceded Trump Tariff Exception", "url": "https://accountable.us/watchdog-rep-marjorie-taylor-greenes-stock-trades-in-semiconductor-companies-suspiciously-preceded-trump-tariff-exception-that-soared-companies-value/", "date": "2025-05-01", "outlet": "Accountable US", "type": "watchdog"}, {"title": "AJC: Marjorie Taylor Greene trades up to $285,000 worth of stock during tariff sell-off", "url": "https://georgiademocrat.org/ajc-marjorie-taylor-greene-trades-up-to-285000-worth-of-stock-during-tariff-sell-off/", "date": "2025-04-14", "outlet": "Atlanta Journal-Constitution", "type": "news"}], "tags": ["insider_trading", "MTG", "congress", "tariffs", "STOCK_Act", "Palantir", "ICE"], "last_updated": "2026-03-28"}, {"id": "pakistan-wlfi-usd1-deal-2026-01", "date": "2026-01-14", "date_end": null, "title": "Pakistan signs MoU with Trump's World Liberty Financial to adopt USD1 stablecoin", "summary": "Pakistan's government signed a memorandum of understanding with World Liberty Financial's affiliate SC Financial Technologies to explore using the Trump family's USD1 stablecoin for cross-border trade and remittances — potentially worth $1 billion. WLFI co-founder Zach Witkoff met with Pakistani Prime Minister Shehbaz Sharif and Finance Minister Aurangzeb to sign the deal. Pakistan is one of the world's largest remittance markets. The Trump family collectively owns 22.5 billion WLFI governance tokens valued at ~$3.8B. This is WLFI's first deal with a sovereign government.", "categories": ["crypto_sales", "foreign_investment", "family_enrichment"], "status": "confirmed", "beneficiary": ["trump_crypto", "trump_family"], "counterparty": {"name": "Government of Pakistan", "type": "foreign_government", "country": "PK", "description": "Pakistani government signed MoU to explore Trump family stablecoin for sovereign payment infrastructure — first sovereign deal for WLFI"}, "actors": ["Zach Witkoff (WLFI CEO)", "PM Muhammad Shehbaz Sharif", "Finance Minister Muhammad Aurangzeb", "World Liberty Financial", "Donald Trump", "Eric Trump", "Donald Trump Jr."], "amount_usd": 1000000000, "amount_note": "MoU explores $1B in stablecoin payments; USD1 market cap was $3.42B at time of deal; Trump family owns tokens worth ~$3.8B", "financial_connection": {"exists": true, "description": "Every USD1 transaction generates fees for World Liberty Financial, which the Trump family controls. Pakistan adopting USD1 would generate ongoing revenue from a sovereign government."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable US-Pakistan relations, potential policy benefits for Pakistan", "received": "Sovereign government adoption of Trump family stablecoin; legitimacy and transaction fees"}, "sources": [{"title": "Pakistan signs Trump-linked World Liberty deal on USD1 stablecoin", "url": "https://crypto.news/pakistan-signs-trump-linked-world-liberty-deal-on-usd1-stablecoin/", "date": "2026-01-14", "outlet": "Crypto News", "type": "news"}, {"title": "For a Few Dollars More: Pakistan Signs Stablecoin Deal With Trump-Linked Crypto Firm Amid Warming U.S. Ties", "url": "https://americankahani.com/lead-stories/for-a-few-dollars-more-pakistan-signs-stablecoin-deal-with-trump-linked-crypto-firm-amid-warming-u-s-ties/", "date": "2026-01-15", "outlet": "American Kahani", "type": "news"}, {"title": "Pakistan Partners with Trump-Linked Firm to Explore $1B Stablecoin Payments", "url": "https://www.fxleaders.com/news/2026/01/14/pakistan-partners-with-trump-linked-firm-to-explore-1b-stablecoin-payments/", "date": "2026-01-14", "outlet": "FX Leaders", "type": "news"}, {"title": "Trump's Crypto Firm Signs First Deal With Pakistan Government", "url": "https://www.coinspeaker.com/trumps-crypto-firm-discloses-first-agreement-with-sovereign-state-pakistan/", "date": "2026-01-14", "outlet": "CoinSpeaker", "type": "news"}], "tags": ["crypto", "Pakistan", "stablecoin", "USD1", "WLFI", "sovereign_deal", "remittances"], "last_updated": "2026-03-28"}, {"id": "pardon-for-pay-economy-2025", "date": "2025-01-20", "date_end": null, "title": "Pardon-for-pay economy: $1M standard lobbyist fee; $3.5M PAC donation; $2B in victim restitution wiped", "summary": "A documented pardon-for-pay economy emerged under Trump. Standard lobbyist fees for pardon work: $1M, with $6M 'success fees' reported. Key cases: Julio Herrera Velutini channeled $3.5M into Trump's super PAC and was pardoned (bribery). Joseph Schwartz paid $1.1M in lobbyist fees and was pardoned for $38M tax fraud. Tim Leiweke's company donated $250K to inauguration; his lawyer Trey Gowdy lobbied Trump at Mar-a-Lago golf. California governor's office calculated Trump pardons wiped nearly $2B in victim restitution and taxpayer recovery. Over half of 88 analyzed pardons went to white-collar criminals.", "categories": ["pardon_financial", "selling_access"], "status": "confirmed", "beneficiary": ["trump_pac", "trump_personally"], "counterparty": {"name": "Pardon applicants and lobbyists (Burkman, Ballard Partners, Katz, Tolman, Gowdy)", "type": "domestic_individual", "country": "US", "description": "Ecosystem of Trump-connected lobbyists charging $1M+ to secure pardons; donors and PAC contributors receiving pardons"}, "actors": ["Donald Trump", "Jack Burkman", "Adam Katz", "Brett Tolman", "Trey Gowdy", "Brian Ballard", "Christopher Kise", "Julio Herrera Velutini", "Joseph Schwartz", "Tim Leiweke"], "amount_usd": 2000000000, "amount_note": "~$2B in victim restitution and taxpayer recovery wiped per California governor's office analysis. $3.5M PAC donation from Herrera Velutini. $1.1M in lobbyist fees from Schwartz. Standard fee: $1M.", "financial_connection": {"exists": true, "description": "Direct financial flow: PAC donations and lobbyist fees (paid to Trump allies) → pardons that forgive billions in restitution owed to victims and government"}, "quid_pro_quo": {"alleged": false, "gave": "Pardons clearing criminal records and wiping restitution obligations", "received": "PAC donations, lobbyist fees to Trump-connected operators, inauguration fund donations"}, "sources": [{"title": "Lobbyists Make Millions in Pursuit of Trump Pardons", "url": "https://www.notus.org/money/pardon-lobbyists-president-donald-trump", "date": "2026-01-01", "outlet": "NOTUS", "type": "news"}, {"title": "Trump pardons drive a big, burgeoning business for lobbyists", "url": "https://www.nbcnews.com/politics/donald-trump/trump-pardons-drive-big-burgeoning-business-lobbyists-rcna209801", "date": "2025-12-01", "outlet": "NBC News", "type": "news"}, {"title": "Trump pardons wipe nearly $2 billion in victim repayment and taxpayer recovery", "url": "https://www.gov.ca.gov/2026/03/05/trumpcriminals3/", "date": "2026-03-05", "outlet": "Office of the Governor of California", "type": "official"}, {"title": "Inside the Pardon Playbook: An Analysis of President Trump's Clemency Abuses", "url": "https://campaignlegal.org/update/inside-pardon-playbook-analysis-president-trumps-clemency-abuses", "date": "2026-02-01", "outlet": "Campaign Legal Center", "type": "watchdog"}, {"title": "Trump's Sordid Pardon Economy", "url": "https://www.aei.org/op-eds/trumps-sordid-pardon-economy/", "date": "2026-01-01", "outlet": "American Enterprise Institute", "type": "watchdog"}, {"title": "The Pardon Project — Senate Democratic Caucus tracker", "url": "https://www.democrats.senate.gov/the-pardon-project", "date": "2026-03-01", "outlet": "US Senate Democrats", "type": "congressional"}], "tags": ["pardons", "pay_to_play", "lobbyists", "PAC_donation", "victim_restitution", "white_collar"], "last_updated": "2026-03-28"}, {"id": "hernandez-pardon-honduras-2025-12", "date": "2025-12-01", "date_end": null, "title": "Trump pardons convicted Honduran ex-president while endorsing his party's candidate in Honduran elections", "summary": "Trump pardoned former Honduran President Juan Orlando Hernández, sentenced to 45 years in a New York federal court for helping drug cartels ship 400+ tons of cocaine to the US while accepting millions in bribes. Trump announced the pardon simultaneously with his endorsement of Nasry 'Tito' Asfura, the candidate of Hernández's National Party, in Honduran elections — directly linking clemency to foreign electoral influence. Honduras issued an Interpol red notice seeking Hernández's re-arrest. Bipartisan congressional resolutions condemned the pardon (H.Res. 929, S.Res. 530).", "categories": ["pardon_political", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Juan Orlando Hernández", "type": "foreign_individual", "country": "HN", "description": "Former President of Honduras (2014–2022), convicted in US federal court of narco-trafficking and accepting cartel bribes"}, "beneficiary": ["trump_personally"], "actors": ["Juan Orlando Hernández", "Nasry 'Tito' Asfura", "Sinaloa cartel"], "amount_usd": null, "amount_note": "No direct financial benefit to Trump identified; political benefit through Honduran electoral influence", "financial_connection": {"exists": false, "description": "No identified financial payment to Trump or family"}, "quid_pro_quo": {"alleged": true, "gave": "Full pardon wiping 45-year drug trafficking sentence", "received": "Political influence — Trump endorsed Hernández's party's candidate in Honduran elections at the same moment the pardon was announced"}, "sources": [{"title": "Trump formally pardons former Honduran President Juan Orlando Hernández", "url": "https://www.cnn.com/2025/12/02/politics/juan-orlando-hernandez-pardon", "date": "2025-12-02", "outlet": "CNN", "type": "news"}, {"title": "Presidential Pardon of Former Honduran President Convicted of Drug Trafficking", "url": "https://www.congress.gov/crs-product/IN12621", "date": "2025-12-10", "outlet": "Congressional Research Service", "type": "congressional"}, {"title": "Juan Orlando Hernández Pardon: Implications for U.S. Foreign Policy", "url": "https://www.wola.org/analysis/juan-orlando-hernandez-pardon-implications-for-u-s-foreign-policy/", "date": "2025-12-05", "outlet": "WOLA", "type": "watchdog"}, {"title": "Honduras seeks arrest of ex-President Hernández after Trump pardon", "url": "https://www.npr.org/2025/12/09/g-s1-101277/honduras-seeks-arrest-hernandez-trump-pardon", "date": "2025-12-09", "outlet": "NPR", "type": "news"}], "tags": ["pardon", "Honduras", "drug_trafficking", "electoral_influence", "foreign_government", "cartels"], "last_updated": "2026-03-29"}, {"id": "trump-fraud-czar-hypocrisy-2026-03", "date": "2026-03-16", "date_end": null, "title": "Trump creates 'Fraud Czar' task force targeting immigrants while having pardoned 70+ convicted fraudsters", "summary": "Trump signed an executive order creating a 'Task Force to Eliminate Fraud' and named VP JD Vance 'Fraud Czar,' targeting immigrant fraud in Minnesota (mostly Somali-Americans) and California. The NYT and House Judiciary Democrats documented that Trump had simultaneously granted clemency to more than 70 people convicted of fraud, forgiving over $700M in fines and restitution — including the longest-ever Medicare fraud sentence (Lawrence Duran, $205M scheme commuted May 2025), and a $660M securities fraud (Trevor Milton). The fired pardon attorney Elizabeth Oyer said Trump pardons those 'he sees something of himself in — a wealthy, successful businessman.'", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "Somali-American community (Minnesota)", "type": "other", "country": "US", "description": "Primary ethnic group targeted in Trump's selective anti-fraud enforcement; majority of MN fraud defendants are Somali-American"}, "beneficiary": ["trump_personally"], "actors": ["JD Vance", "Elizabeth Oyer", "Lawrence Duran", "Trevor Milton", "Philip Esformes"], "amount_usd": null, "amount_note": "Trump claims $19B in MN fraud (federal prosecutors estimate $9B); Trump's own pardons forgave $700M+ in fines/restitution per DOJ documents", "financial_connection": {"exists": false, "description": "No direct financial benefit — political enforcement theater"}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Trump Vowed to Crack Down on Fraudsters, but He's Pardoned Dozens", "url": "https://www.nytimes.com/2026/03/19/us/politics/trump-fraudsters-pardons.html", "date": "2026-03-19", "outlet": "New York Times", "type": "news"}, {"title": "Trump's pardons cost victims and taxpayers $1.3 billion, House Judiciary Committee Democrats' review says", "url": "https://www.cbsnews.com/news/trumps-pardons-cost-victims-and-taxpayers-1-3-billion-house-judiciary-committee-democrats-review/", "date": "2025-06-17", "outlet": "CBS News", "type": "news"}, {"title": "An Embarrassment of Riches", "url": "https://www.cato.org/blog/embarrassment-riches", "date": "2025-06-01", "outlet": "Cato Institute", "type": "watchdog"}], "tags": ["fraud", "selective_enforcement", "power_abuse", "retaliation", "Minnesota", "immigration", "pardon", "hypocrisy"], "last_updated": "2026-03-29"}, {"id": "house-gop-doral-retreat-2025-01", "date": "2025-01-27", "date_end": "2025-01-29", "title": "House Republicans hold official retreat at Trump's Doral resort — first time Congress pays Trump directly for governing venue", "summary": "130 of 218 House Republicans attended the Republican Conference's annual retreat at Trump National Doral in Miami, January 27–29, 2025 — days after Trump's inauguration. It marked the first time House Republicans had spent money directly on a venue owned by the sitting president. Room rates at Doral range from $460 to over $8,000/night. A comparable 2018 GOP event at Doral generated $630,000 in revenue for Trump's company. Congressional leadership chose the venue for legislative strategy sessions, routing public and party funds into the president's private business.", "categories": ["business_payment", "selling_access"], "status": "confirmed", "counterparty": {"name": "House Republican Conference", "type": "congress_member", "country": "US", "description": "House Republican leadership and members paying Trump's resort for their official legislative retreat"}, "beneficiary": ["trump_org"], "actors": ["Mike Johnson", "Donald Trump", "House Republican Conference"], "amount_usd": 630000, "amount_note": "Exact 2025 amount not yet disclosed; comparable 2018 retreat generated $630K for Trump. Room rates $460–$8,000/night; up to 130 members attending.", "financial_connection": {"exists": true, "description": "Congress is directly paying the sitting president's private resort for the official legislative retreat. Direct flow from party/government funds to Trump's business."}, "quid_pro_quo": {"alleged": true, "gave": "Choice of venue that routes congressional spending to Trump's resort", "received": "Trump access, favor, influence — retreat chosen by leadership loyal to Trump"}, "sources": [{"title": "House GOP holds retreat at a Trump property, a windfall to president's resort", "url": "https://www.washingtonpost.com/politics/2025/01/28/house-republican-retreat-trump-national-doral/", "date": "2025-01-28", "outlet": "Washington Post", "type": "news"}, {"title": "House Republicans Are Paying Trump a Hefty Amount for Their Retreat", "url": "https://newrepublic.com/post/189214/donald-trump-resort-republicans-retreat", "date": "2025-01-28", "outlet": "The New Republic", "type": "news"}], "tags": ["Doral", "Congress", "retreat", "emoluments", "business_payment", "GOP", "legislative"], "last_updated": "2026-03-29"}, {"id": "trump-golf-taxpayer-cost-2025", "date": "2025-01-20", "date_end": null, "title": "Trump golf trips cost taxpayers $100M+ in year 1 — $300M projected for full term, mostly at his own properties", "summary": "By early 2026, Trump's golf habit had cost taxpayers over $101M in travel and security in his second term alone, on pace for $300M over four years — double his first-term tab of $151M. Trump has golfed on more than one quarter of his days in office, almost always at his own properties where he collects fees from the Secret Service and government. The Secret Service paid over $100K directly to Trump properties in the first months of the term, including contracts for golf carts ($550K) and portable restrooms at Bedminster. Each trip to Mar-a-Lago costs $3.4M in Air Force One, motorcade, and security expenses. Air Force One alone costs $273K/hour. Trump's 2024 disclosure reported $267M in golf-related income.", "categories": ["business_payment"], "status": "confirmed", "counterparty": {"name": "US Treasury / taxpayers", "type": "other", "country": "US", "description": "Federal taxpayers funding presidential travel whose cost accrues to Trump's private golf properties"}, "beneficiary": ["trump_org", "trump_personally"], "actors": ["Donald Trump", "Secret Service", "US Air Force"], "amount_usd": 101200000, "amount_note": "$101.2M spent by late 2025; $300M projected for full term; $3.4M per Mar-a-Lago trip; $273K/hour Air Force One; $550K golf cart contract at Bedminster; $267M golf income on Trump's 2024 financial disclosure", "financial_connection": {"exists": true, "description": "Every golf trip to a Trump property routes federal security spending (golf carts, lodging, logistics) into Trump's business. Secret Service paid directly to Trump properties for access."}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Second-Term Tab For Trump's Golf Hobby Tops $70 Million, On Track To Exceed $300 Million", "url": "https://www.huffpost.com/entry/trump-golf-300-million_n_69271f3ce4b00aca68d3d689", "date": "2025-12-01", "outlet": "HuffPost", "type": "news"}, {"title": "Secret Service has spent nearly $100k at Trump properties", "url": "https://www.citizensforethics.org/reports-investigations/crew-investigations/secret-service-has-spent-nearly-100k-at-trump-properties/", "date": "2025-06-01", "outlet": "CREW", "type": "watchdog"}, {"title": "Tracking Taxpayer Spending at Trump Properties", "url": "https://americanoversight.org/tracking-taxpayer-spending-at-trump-properties/", "date": "2025-01-01", "outlet": "American Oversight", "type": "watchdog"}, {"title": "Trump's term 2 corruption by the numbers", "url": "https://www.citizensforethics.org/reports-investigations/crew-reports/trumps-term-2-corruption-by-the-numbers-more-golf-trips-more-foreign-visitors-and-more-profits/", "date": "2026-01-20", "outlet": "CREW", "type": "watchdog"}], "tags": ["golf", "Mar-a-Lago", "Bedminster", "Doral", "Secret_Service", "taxpayer", "emoluments", "travel_cost"], "last_updated": "2026-03-29"}, {"id": "vietnam-golf-resort-tariff-2025-05", "date": "2025-05-16", "date_end": "2025-07-03", "title": "Vietnam approves $1.5B Trump golf resort during tariff negotiations — tariffs cut from 46% to 20% weeks after groundbreaking", "summary": "Vietnam approved a $1.5 billion Trump Organization golf and residential resort (3 golf courses, luxury housing, 2,446 acres) in May 2025 while simultaneously negotiating to avoid Trump's 46% Liberation Day tariffs. Eric Trump attended the groundbreaking with Vietnam's Prime Minister. Weeks later, the US announced a trade deal reducing Vietnam's tariff rate to 20% — down from 46%. Critics called it a textbook conflict of interest: Vietnam fast-tracked the biggest Trump Organization development in East Asia while seeking tariff relief from the president.", "categories": ["business_payment", "family_enrichment", "foreign_investment"], "status": "confirmed", "counterparty": {"name": "Vietnam (Government of Vietnam / Kinhbac City developer)", "type": "foreign_government", "country": "VN", "description": "Vietnamese government and state-linked developer that approved and partnered on the Trump Organization's largest East Asia development during US tariff negotiations"}, "beneficiary": ["trump_org", "trump_personally"], "actors": ["Eric Trump", "Vietnam Prime Minister", "Kinhbac City", "Donald Trump"], "amount_usd": 1500000000, "amount_note": "$1.5B total project value; Vietnam's tariff rate cut from 46% to 20% in the trade deal finalized weeks after groundbreaking. Trump family stands to earn significant licensing/management fees.", "financial_connection": {"exists": true, "description": "Trump Organization receives licensing and management fees from the $1.5B project. Project approved and broken ground while Vietnam was negotiating tariff relief directly with Trump's White House."}, "quid_pro_quo": {"alleged": true, "gave": "Trade deal cutting Vietnam's tariff rate from 46% to 20%", "received": "Approval and groundbreaking of Trump Organization's largest East Asia development ($1.5B)"}, "sources": [{"title": "Vietnam's PM and Eric Trump break ground on $1.5B luxury golf resort amid US tariff talks", "url": "https://www.foxbusiness.com/fox-news-world/vietnams-pm-eric-trump-break-ground-1-5b-luxury-golf-resort-amid-us-tariff-talks", "date": "2025-05-20", "outlet": "Fox Business", "type": "news"}, {"title": "Vietnam Expedites Trump Golf Club As Country Seeks To Avoid Punitive U.S. Tariffs", "url": "https://www.huffpost.com/entry/vietnam-trump-golf-club-tariffs_n_682de448e4b0627160e800c0", "date": "2025-05-21", "outlet": "HuffPost", "type": "news"}, {"title": "Trump Reduces Tariffs on Vietnam as Trump Organization Looks to Expand Investments", "url": "https://www.democracynow.org/2025/7/3/headlines/trump_reduces_tariffs_on_vietnam_as_trump_organization_looks_to_expand_investments", "date": "2025-07-03", "outlet": "Democracy Now", "type": "news"}, {"title": "Trade war and Vietnam's $1.5 billion deal with the Trump Organization", "url": "https://www.npr.org/2025/06/17/1254291430/vietnam-trump-organization-golf-resort-deal-trade-war", "date": "2025-06-17", "outlet": "NPR", "type": "news"}], "tags": ["Vietnam", "golf", "tariffs", "conflict_of_interest", "Eric_Trump", "trade_deal", "Liberation_Day"], "last_updated": "2026-03-29"}, {"id": "kushner-belgrade-trump-tower-2025-11", "date": "2025-11-07", "date_end": "2025-12-15", "title": "Serbia fast-tracks demolition of protected cultural monument for Kushner's Trump Tower Belgrade — culture minister indicted, project scrapped", "summary": "Jared Kushner's Affinity Partners planned a $500M Trump-branded hotel on the site of the Yugoslav General Staff HQ in Belgrade — a protected cultural monument of national importance, partially destroyed in 1999 NATO strikes and designated 'a European masterpiece of Modernist architecture.' Serbia fast-tracked a special law to strip the building's cultural heritage status to enable demolition. International heritage organizations protested. In December 2025, Serbia's organized crime prosecutor indicted Culture Minister Nikola Selakovic for illegally removing the buildings' protection. Within hours of the indictment, Ku
