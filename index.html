101M in travel and security in his second term alone, on pace for $300M over four years — double his first-term tab of $151M. Trump has golfed on more than one quarter of his days in office, almost always at his own properties where he collects fees from the Secret Service and government. The Secret Service paid over $100K directly to Trump properties in the first months of the term, including contracts for golf carts ($550K) and portable restrooms at Bedminster. Each trip to Mar-a-Lago costs $3.4M in Air Force One, motorcade, and security expenses. Air Force One alone costs $273K/hour. Trump's 2024 disclosure reported $267M in golf-related income.", "categories": ["business_payment"], "status": "confirmed", "counterparty": {"name": "US Treasury / taxpayers", "type": "other", "country": "US", "description": "Federal taxpayers funding presidential travel whose cost accrues to Trump's private golf properties"}, "beneficiary": ["trump_org", "trump_personally"], "actors": ["Donald Trump", "Secret Service", "US Air Force"], "amount_usd": 101200000, "amount_note": "$101.2M spent by late 2025; $300M projected for full term; $3.4M per Mar-a-Lago trip; $273K/hour Air Force One; $550K golf cart contract at Bedminster; $267M golf income on Trump's 2024 financial disclosure", "financial_connection": {"exists": true, "description": "Every golf trip to a Trump property routes federal security spending (golf carts, lodging, logistics) into Trump's business. Secret Service paid directly to Trump properties for access."}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "sources": [{"title": "Second-Term Tab For Trump's Golf Hobby Tops $70 Million, On Track To Exceed $300 Million", "url": "https://www.huffpost.com/entry/trump-golf-300-million_n_69271f3ce4b00aca68d3d689", "date": "2025-12-01", "outlet": "HuffPost", "type": "news"}, {"title": "Secret Service has spent nearly $100k at Trump properties", "url": "https://www.citizensforethics.org/reports-investigations/crew-investigations/secret-service-has-spent-nearly-100k-at-trump-properties/", "date": "2025-06-01", "outlet": "CREW", "type": "watchdog"}, {"title": "Tracking Taxpayer Spending at Trump Properties", "url": "https://americanoversight.org/tracking-taxpayer-spending-at-trump-properties/", "date": "2025-01-01", "outlet": "American Oversight", "type": "watchdog"}, {"title": "Trump's term 2 corruption by the numbers", "url": "https://www.citizensforethics.org/reports-investigations/crew-reports/trumps-term-2-corruption-by-the-numbers-more-golf-trips-more-foreign-visitors-and-more-profits/", "date": "2026-01-20", "outlet": "CREW", "type": "watchdog"}], "tags": ["golf", "Mar-a-Lago", "Bedminster", "Doral", "Secret_Service", "taxpayer", "emoluments", "travel_cost"], "last_updated": "2026-03-29", "motivation": "financial"}, {"id": "vietnam-golf-resort-tariff-2025-05", "date": "2025-05-16", "date_end": "2025-07-03", "title": "Vietnam approves $1.5B Trump golf resort during tariff negotiations — tariffs cut from 46% to 20% weeks after groundbreaking", "summary": "Vietnam approved a $1.5 billion Trump Organization golf and residential resort (3 golf courses, luxury housing, 2,446 acres) in May 2025 while simultaneously negotiating to avoid Trump's 46% Liberation Day tariffs. Eric Trump attended the groundbreaking with Vietnam's Prime Minister. Weeks later, the US announced a trade deal reducing Vietnam's tariff rate to 20% — down from 46%. Critics called it a textbook conflict of interest: Vietnam fast-tracked the biggest Trump Organization development in East Asia while seeking tariff relief from the president.", "categories": ["business_payment", "family_enrichment", "foreign_investment"], "status": "confirmed", "counterparty": {"name": "Vietnam (Government of Vietnam / Kinhbac City developer)", "type": "foreign_government", "country": "VN", "description": "Vietnamese government and state-linked developer that approved and partnered on the Trump Organization's largest East Asia development during US tariff negotiations"}, "beneficiary": ["trump_org", "trump_personally"], "actors": ["Eric Trump", "Vietnam Prime Minister", "Kinhbac City", "Donald Trump"], "amount_usd": 1500000000, "amount_note": "$1.5B total project value; Vietnam's tariff rate cut from 46% to 20% in the trade deal finalized weeks after groundbreaking. Trump family stands to earn significant licensing/management fees.", "financial_connection": {"exists": true, "description": "Trump Organization receives licensing and management fees from the $1.5B project. Project approved and broken ground while Vietnam was negotiating tariff relief directly with Trump's White House."}, "quid_pro_quo": {"alleged": true, "gave": "Trade deal cutting Vietnam's tariff rate from 46% to 20%", "received": "Approval and groundbreaking of Trump Organization's largest East Asia development ($1.5B)"}, "sources": [{"title": "Vietnam's PM and Eric Trump break ground on $1.5B luxury golf resort amid US tariff talks", "url": "https://www.foxbusiness.com/fox-news-world/vietnams-pm-eric-trump-break-ground-1-5b-luxury-golf-resort-amid-us-tariff-talks", "date": "2025-05-20", "outlet": "Fox Business", "type": "news"}, {"title": "Vietnam Expedites Trump Golf Club As Country Seeks To Avoid Punitive U.S. Tariffs", "url": "https://www.huffpost.com/entry/vietnam-trump-golf-club-tariffs_n_682de448e4b0627160e800c0", "date": "2025-05-21", "outlet": "HuffPost", "type": "news"}, {"title": "Trump Reduces Tariffs on Vietnam as Trump Organization Looks to Expand Investments", "url": "https://www.democracynow.org/2025/7/3/headlines/trump_reduces_tariffs_on_vietnam_as_trump_organization_looks_to_expand_investments", "date": "2025-07-03", "outlet": "Democracy Now", "type": "news"}, {"title": "Trade war and Vietnam's $1.5 billion deal with the Trump Organization", "url": "https://www.npr.org/2025/06/17/1254291430/vietnam-trump-organization-golf-resort-deal-trade-war", "date": "2025-06-17", "outlet": "NPR", "type": "news"}], "tags": ["Vietnam", "golf", "tariffs", "conflict_of_interest", "Eric_Trump", "trade_deal", "Liberation_Day"], "last_updated": "2026-03-29", "motivation": "financial"}, {"id": "kushner-belgrade-trump-tower-2025-11", "date": "2025-11-07", "date_end": "2025-12-15", "title": "Serbia fast-tracks demolition of protected cultural monument for Kushner's Trump Tower Belgrade — culture minister indicted, project scrapped", "summary": "Jared Kushner's Affinity Partners planned a $500M Trump-branded hotel on the site of the Yugoslav General Staff HQ in Belgrade — a protected cultural monument of national importance, partially destroyed in 1999 NATO strikes and designated 'a European masterpiece of Modernist architecture.' Serbia fast-tracked a special law to strip the building's cultural heritage status to enable demolition. International heritage organizations protested. In December 2025, Serbia's organized crime prosecutor indicted Culture Minister Nikola Selakovic for illegally removing the buildings' protection. Within hours of the indictment, Kushner's firm withdrew the project.", "categories": ["family_enrichment", "foreign_investment", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Republic of Serbia / President Aleksandar Vučić", "type": "foreign_government", "country": "RS", "description": "Serbian government that fast-tracked destruction of a protected cultural monument to accommodate Kushner/Trump family hotel project"}, "beneficiary": ["trump_family", "kushner"], "actors": ["Jared Kushner", "Affinity Partners", "Aleksandar Vučić", "Nikola Selakovic (Culture Minister)"], "amount_usd": 500000000, "amount_note": "$500M planned hotel/mixed-use development. Project scrapped after culture minister indicted for illegally removing heritage protection.", "financial_connection": {"exists": true, "description": "Affinity Partners (Kushner) stood to profit from $500M development. Serbia used state power to demolish cultural heritage for the benefit of the US president's son-in-law."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable US-Serbia relations under Trump; Vučić seeking US support", "received": "Serbia fast-tracks special legislation to demolish protected monument for Kushner/Trump hotel project"}, "sources": [{"title": "Serbia fast-tracks army HQ demolition for Trump family hotel", "url": "https://www.france24.com/en/live-news/20251107-serbia-fast-tracks-army-hq-demolition-for-trump-family-hotel", "date": "2025-11-07", "outlet": "France 24", "type": "news"}, {"title": "Kushner Scraps Trump Tower Belgrade After Officials Indicted", "url": "https://www.bloomberg.com/news/articles/2025-12-15/kushner-scraps-trump-tower-belgrade-after-officials-indicted", "date": "2025-12-15", "outlet": "Bloomberg", "type": "news"}, {"title": "Trump hotel project canceled in Serbia after protests, investigation", "url": "https://www.washingtonpost.com/world/2025/12/17/serbia-trump-tower-canceled-protests/", "date": "2025-12-17", "outlet": "Washington Post", "type": "news"}], "tags": ["Serbia", "Belgrade", "Kushner", "Affinity_Partners", "cultural_heritage", "hotel", "family_enrichment"], "last_updated": "2026-03-29", "motivation": "financial"}, {"id": "doj-ig-mass-firing-2025-01", "date": "2025-01-24", "date_end": "2025-01-25", "title": "Trump fires 17 Inspectors General in overnight purge", "summary": "On the night of January 24-25, 2025, Trump fired 17 Senate-confirmed Inspectors General via email with no notice. The IGs are the independent watchdogs of federal agencies — their role is to investigate fraud, waste, and abuse within their agencies. The firings violated the Inspector General Act, which requires 30-day advance notice to Congress. A federal judge later called it 'obvious' that the firings were unlawful. The removed IGs covered agencies including DoD, State Department, Transportation, HUD, EPA, and others. Congress was not notified in advance. At least some IGs were reinstated pending litigation, but most were not. NPR and POGO documented that several IGs had active investigations into Trump allies or administration activities at the time of their removal.", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "17 Federal Inspectors General", "type": "government_official", "country": "US", "description": "17 Senate-confirmed IGs fired overnight; independent watchdogs of federal agencies"}, "beneficiary": ["trump_personally", "trump_allies"], "actors": ["Donald Trump", "White House Counsel's Office"], "amount_usd": null, "amount_note": "No direct financial amount; IGs were investigating potential fraud involving billions in federal spending", "financial_connection": {"exists": true, "description": "Several IGs had active investigations into federal spending and Trump-connected contracts. Removing watchdogs removes oversight over federal money flows."}, "quid_pro_quo": {"alleged": true, "gave": "Removal of independent oversight over federal agencies", "received": "Protection from investigation for Trump allies and administration officials"}, "tags": ["firings", "oversight", "rule_of_law", "inspector_general", "confirmed_illegal"], "last_updated": "2026-03-28", "sources": [{"title": "Trump fires at least 17 inspectors general overnight", "url": "https://www.npr.org/2025/01/25/nx-s1-5278671/trump-fires-inspectors-general-overnight", "date": "2025-01-25", "outlet": "NPR", "type": "news"}, {"title": "Federal judge says it was 'obvious' Trump's firing of inspectors general was unlawful", "url": "https://www.npr.org/2025/02/12/nx-s1-5298000/trump-inspectors-general-firing-unlawful-judge", "date": "2025-02-12", "outlet": "NPR", "type": "news"}, {"title": "Trump Fires 17 Inspectors General", "url": "https://pogoarchives.org/p/ig/trump-fires-17-igs-2025.pdf", "date": "2025-01-25", "outlet": "POGO (Project on Government Oversight)", "type": "watchdog"}], "motivation": "political"}, {"id": "military-purge-senior-officers-2025-02", "date": "2025-01-20", "date_end": "2025-04-30", "title": "Trump and Hegseth purge senior military leadership", "summary": "Beginning on inauguration day and accelerating through early 2025, Trump and Defense Secretary Pete Hegseth fired or sidelined dozens of senior military officers. Confirmed firings include: Gen. Charles Q. Brown Jr. (Chairman of the Joint Chiefs of Staff — fired Feb 22); Adm. Lisa Franchetti (Chief of Naval Operations — fired Feb 22); Adm. Linda Fagan (Commandant of the Coast Guard — fired Jan 20, immediately upon inauguration, the first Coast Guard commandant ever fired mid-term); two senior female 4-star officers removed (Fagan and another). Hegseth ordered a 20% reduction in 4-star officer positions. More than two dozen generals and admirals were sidelined or had their assignments cancelled. Trump and Hegseth stated the purge was to remove 'woke' officers. Critics including former defense officials said the purge removed experienced warfighters and damaged military readiness based on ideological and political criteria rather than performance.", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "US Military Senior Leadership", "type": "government_official", "country": "US", "description": "Chairman JCS Gen. Brown, CNO Adm. Franchetti, Coast Guard Cmdt Adm. Fagan, and 20+ other senior officers"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "Pete Hegseth", "Department of Defense"], "amount_usd": null, "amount_note": "No direct financial amount; cost to military readiness and national security is disputed", "financial_connection": {"exists": false, "description": "No direct financial connection. Power consolidation over military command."}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "tags": ["firings", "military", "power_consolidation", "hegseth"], "last_updated": "2026-03-28", "sources": [{"title": "Trump fires Joint Chiefs chairman Gen. CQ Brown and other top military officers", "url": "https://www.npr.org/2025/02/22/nx-s1-5311894/trump-fires-military-joint-chiefs-cq-brown", "date": "2025-02-22", "outlet": "NPR", "type": "news"}, {"title": "Hegseth fires top Navy admiral and two other senior officers", "url": "https://www.politico.com/news/2025/02/22/hegseth-fires-admirals-generals-00205992", "date": "2025-02-22", "outlet": "Politico", "type": "news"}, {"title": "Coast Guard Commandant Linda Fagan fired on inauguration day", "url": "https://www.cnn.com/2025/01/20/politics/coast-guard-commandant-linda-fagan-fired", "date": "2025-01-20", "outlet": "CNN", "type": "news"}], "motivation": "political"}, {"id": "fbi-purge-trump-investigators-2025", "date": "2025-01-20", "date_end": "2025-06-30", "title": "FBI purge: Kash Patel fires agents who investigated Trump", "summary": "After Kash Patel was confirmed as FBI Director, the White House directed him to fire FBI agents who had worked on investigations into Donald Trump — including the January 6 investigation and the classified documents case. Fired agents sued the administration, and court filings confirmed White House direction. Patel additionally fired FBI agents with expertise in Iran and counterterrorism, reportedly for ideological reasons. Senior FBI officials who refused to cooperate with directives to fire specific agents were themselves fired or forced to resign. The FBI agents' union and civil liberties groups called it an unprecedented political purge of the law-enforcement agency. Trump had publicly and repeatedly demanded for years that FBI agents who investigated him be fired or prosecuted.", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "FBI agents (Trump investigation teams)", "type": "government_official", "country": "US", "description": "Agents who worked on Jan 6 investigation, classified documents case, and other Trump-related investigations"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "Kash Patel", "FBI", "White House"], "amount_usd": null, "amount_note": null, "financial_connection": {"exists": true, "description": "Removing investigators who worked on Trump's financial crimes cases (classified documents, Jan 6) terminates their ability to uncover further Trump-related financial misconduct."}, "quid_pro_quo": {"alleged": true, "gave": "Firing of agents who investigated Trump and his allies", "received": "Personal protection from ongoing FBI oversight; reward to Patel, a long-time Trump loyalist"}, "tags": ["firings", "fbi", "rule_of_law", "obstruction", "kash_patel"], "last_updated": "2026-03-28", "sources": [{"title": "FBI agents who investigated Trump fired in purge directed by White House", "url": "https://www.washingtonpost.com/national-security/2025/04/15/fbi-agents-fired-trump-investigations/", "date": "2025-04-15", "outlet": "Washington Post", "type": "news"}, {"title": "Fired FBI agents sue over politically motivated dismissals", "url": "https://www.nytimes.com/2025/05/01/us/politics/fbi-agents-fired-lawsuit.html", "date": "2025-05-01", "outlet": "New York Times", "type": "news"}], "motivation": "political"}, {"id": "health-agency-mass-firings-2025-02", "date": "2025-02-13", "date_end": "2025-03-31", "title": "Mass firings at NIH, FDA, CDC, NOAA — health and science agencies gutted", "summary": "In February and March 2025, the Trump administration fired approximately 1,200 NIH staff, 3,500 FDA employees, 2,400 CDC employees, and 880 NOAA employees, often without explanation. Many were probationary employees or recent hires, but the cuts also affected experienced scientists. The NIH firings targeted the agency's research programs and impacted ongoing trials for cancer, HIV, and other diseases. FDA staffers fired included drug inspectors, food safety scientists, and vaccine reviewers. CDC cuts hit epidemiologists and emergency response teams. NOAA cuts targeted meteorologists and climate scientists. DOGE (led by Elon Musk) coordinated many of the cuts. NIH director Dr. Jay Bhattacharya said the firings were needed to 'streamline' the agency. Former agency heads said the firings will cause lasting damage to public health infrastructure. Courts blocked some reinstatements but the mass departures were largely not reversed.", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "NIH / FDA / CDC / NOAA staff", "type": "government_official", "country": "US", "description": "~8,000 health, science, and weather agency employees fired; NIH 1,200, FDA 3,500, CDC 2,400, NOAA 880"}, "beneficiary": ["trump_personally", "doge"], "actors": ["Donald Trump", "Elon Musk", "DOGE", "RFK Jr.", "Jay Bhattacharya", "HHS"], "amount_usd": null, "amount_note": "No direct financial amount to Trump; claimed budget savings disputed by agency heads", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit identified. Elon Musk's DOGE interests may benefit from reduced regulatory capacity."}, "quid_pro_quo": {"alleged": false, "gave": null, "received": null}, "tags": ["firings", "doge", "nih", "fda", "cdc", "noaa", "science", "public_health"], "last_updated": "2026-03-28", "sources": [{"title": "NIH fires 1,200 employees as DOGE cuts hit federal health agencies", "url": "https://www.npr.org/sections/health-shots/2025/02/14/nx-s1-5301500/nih-fires-employees-doge", "date": "2025-02-14", "outlet": "NPR", "type": "news"}, {"title": "FDA fires 3,500 employees; food and drug safety inspectors among those cut", "url": "https://www.politico.com/news/2025/02/19/fda-mass-layoffs-doge-00207001", "date": "2025-02-19", "outlet": "Politico", "type": "news"}, {"title": "CDC and NOAA cuts: what the loss of thousands of scientists means for public health", "url": "https://www.washingtonpost.com/health/2025/03/10/cdc-noaa-firings-doge/", "date": "2025-03-10", "outlet": "Washington Post", "type": "news"}], "motivation": "political"}, {"id": "doj-comey-indictment-2025-09", "date": "2025-09-25", "date_end": "2025-11-24", "title": "Trump DOJ indicts James Comey — charges dismissed after 2 months", "summary": "On September 25, 2025, the DOJ under Trump indicted former FBI Director James Comey on charges related to his handling of classified materials (the memos Comey wrote about his meetings with Trump). Trump had called for Comey's prosecution repeatedly on Truth Social and in press conferences. Comey had famously been fired by Trump in 2017, which Trump later said was because of the Russia investigation. The indictment was seen by legal experts as a selective prosecution — no other former FBI director had been charged for similar conduct. The charges were dismissed on November 24, 2025, after the DOJ reportedly could not make a viable case. Critics called it a politically motivated prosecution designed to harass and discredit Trump's most prominent critic.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "James Comey", "type": "individual", "country": "US", "description": "Former FBI Director who Trump fired in 2017; Comey's memos documented Trump's attempts to obstruct the Russia investigation"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "Pam Bondi"], "amount_usd": null, "amount_note": null, "financial_connection": {"exists": false, "description": "No financial connection. Retaliation for Comey's role in Russia investigation and his public criticism of Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Prosecution of Trump's most prominent political enemy", "received": "Discrediting Comey as a witness; political signal to other potential critics"}, "tags": ["prosecution", "retaliation", "comey", "fbi", "rule_of_law", "dismissed"], "last_updated": "2026-03-28", "sources": [{"title": "Trump DOJ indicts former FBI Director James Comey", "url": "https://www.nytimes.com/2025/09/25/us/politics/comey-indicted-trump-doj.html", "date": "2025-09-25", "outlet": "New York Times", "type": "news"}, {"title": "DOJ drops Comey charges after two months", "url": "https://www.washingtonpost.com/national-security/2025/11/24/comey-charges-dropped-doj/", "date": "2025-11-24", "outlet": "Washington Post", "type": "news"}], "motivation": "political"}, {"id": "doj-bolton-indictment-2025-10", "date": "2025-10-15", "date_end": null, "title": "Trump DOJ indicts John Bolton on classified documents charges", "summary": "In October 2025, the DOJ indicted former National Security Advisor John Bolton on charges related to classified materials in his memoir. Bolton had been one of Trump's most prominent Republican critics, testified before Congress during the first impeachment, and published 'The Room Where It Happened' which painted Trump as unfit for office. Trump had threatened Bolton publicly and reportedly discussed having him prosecuted. Legal experts noted the charges were selective — classified information in memoirs by former officials is common and rarely prosecuted. Bolton called the charges politically motivated retaliation for his criticism of Trump. As of this writing, the case is pending.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "John Bolton", "type": "individual", "country": "US", "description": "Former National Security Advisor (2018-2019); fired by Trump; testified against Trump in first impeachment; wrote critical memoir"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "Pam Bondi"], "amount_usd": null, "amount_note": null, "financial_connection": {"exists": false, "description": "No financial connection. Retaliation for Bolton's testimony and memoir."}, "quid_pro_quo": {"alleged": true, "gave": "Prosecution of Trump's former advisor who became a critic", "received": "Deterrence of other officials from speaking out; discrediting Bolton"}, "tags": ["prosecution", "retaliation", "bolton", "rule_of_law", "impeachment_witness"], "last_updated": "2026-03-28", "sources": [{"title": "Trump DOJ indicts John Bolton on classified documents charges", "url": "https://www.nytimes.com/2025/10/15/us/politics/bolton-indicted-classified-documents.html", "date": "2025-10-15", "outlet": "New York Times", "type": "news"}], "motivation": "political"}, {"id": "doj-letitia-james-indictment-2025-10", "date": "2025-10-22", "date_end": null, "title": "Trump DOJ indicts New York AG Letitia James — who successfully sued Trump", "summary": "In October 2025, the DOJ indicted New York Attorney General Letitia James on mortgage fraud charges. James had been the lead prosecutor in the New York civil fraud case that resulted in a $454 million judgment against Trump and the Trump Organization in February 2024. She had also led investigations into Trump's business practices. The indictment alleged she misrepresented her income on mortgage applications for properties in Virginia and New York. James denied the allegations and called the prosecution politically motivated retaliation. Her Virginia case involved a property that has been examined in real estate fraud investigations. Legal experts noted the timing — her indictment came while she was appealing Trump's civil fraud case — and called it 'textbook selective prosecution.' She remained in office pending the case.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Letitia James", "type": "individual", "country": "US", "description": "New York State Attorney General; won $454M civil fraud judgment against Trump Organization in Feb 2024"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "Pam Bondi"], "amount_usd": null, "amount_note": "Indirect financial link: James won $454M judgment against Trump; her prosecution may affect ongoing appeals", "financial_connection": {"exists": true, "description": "James secured a $454M judgment against Trump. Her prosecution, while she is appealing that case, may be intended to discredit her and affect the civil case."}, "quid_pro_quo": {"alleged": true, "gave": "Prosecution of the AG who won $454M judgment against Trump", "received": "Potential to discredit James as Trump's judgment is appealed; deterrence of state-level prosecution"}, "tags": ["prosecution", "retaliation", "letitia_james", "new_york", "civil_fraud", "rule_of_law"], "last_updated": "2026-03-28", "sources": [{"title": "Trump DOJ indicts New York AG Letitia James on mortgage fraud", "url": "https://www.nytimes.com/2025/10/22/us/politics/letitia-james-indicted-trump-doj.html", "date": "2025-10-22", "outlet": "New York Times", "type": "news"}, {"title": "Letitia James calls Trump indictment 'retaliation' for fraud case", "url": "https://www.politico.com/news/2025/10/22/letitia-james-trump-retaliation-indictment-00230001", "date": "2025-10-22", "outlet": "Politico", "type": "news"}], "motivation": "both"}, {"id": "doj-schiff-investigation-2025", "date": "2025-02-01", "date_end": null, "title": "Trump demands prosecution of Sen. Adam Schiff — DOJ opens investigation", "summary": "Trump posted on Truth Social in late January/early February 2025 explicitly demanding that the DOJ investigate and prosecute Senator Adam Schiff (D-CA), the former House Intelligence Committee chairman who led the first Trump impeachment inquiry. Trump accused Schiff of 'treason' and 'lying' in his committee work. Following Trump's post, the DOJ announced it was opening an investigation into Schiff for his handling of classified materials and his conduct during the impeachment proceedings. Schiff called it 'banana republic' politics. No charges had been brought as of this writing. This follows a clear pattern: Trump publicly names a target, the DOJ acts. Legal experts noted the sequence is unusual — typically investigations are initiated by prosecutors, not by presidential social media posts.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Adam Schiff", "type": "individual", "country": "US", "description": "US Senator (D-CA); former House Intelligence Committee chairman; led first Trump impeachment inquiry"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "Pam Bondi"], "amount_usd": null, "amount_note": null, "financial_connection": {"exists": false, "description": "No financial connection. Political retaliation for impeachment role."}, "quid_pro_quo": {"alleged": true, "gave": "DOJ investigation of Trump's political enemy following Trump's public demand", "received": "Discrediting and harassing Trump's most prominent impeachment prosecutor"}, "tags": ["prosecution", "retaliation", "schiff", "impeachment", "rule_of_law", "truth_social_demand"], "last_updated": "2026-03-28", "sources": [{"title": "Trump demands DOJ prosecute Adam Schiff in Truth Social post", "url": "https://www.politico.com/news/2025/02/01/trump-truth-social-schiff-prosecution-00201001", "date": "2025-02-01", "outlet": "Politico", "type": "news"}, {"title": "DOJ opens investigation into Sen. Schiff after Trump demand", "url": "https://www.washingtonpost.com/politics/2025/02/15/doj-schiff-investigation-trump/", "date": "2025-02-15", "outlet": "Washington Post", "type": "news"}], "motivation": "political"}, {"id": "doj-taylor-krebs-eo-2025-04", "date": "2025-04-09", "date_end": null, "title": "Trump EO directs DOJ to investigate Miles Taylor and Christopher Krebs", "summary": "On April 9, 2025, Trump signed an Executive Order directing the DOJ and FBI to investigate Miles Taylor (the former DHS chief of staff who wrote the 'Anonymous' NYT op-ed and book criticizing Trump) and Christopher Krebs (former CISA director who publicly certified the 2020 election as secure and was fired by Trump). The EO accused both men of 'corrupt conduct' and directed agencies to review their security clearances and open investigations. Taylor had been the unnamed 'Anonymous' author, a fact that enraged Trump. Krebs's 'Rumor Control' website debunked election fraud claims. Legal experts called the EO an unprecedented use of presidential power to direct investigations against private citizens who had criticized him. Krebs's employer, SentinelOne, suspended his access to company information during the review, cutting off his income.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Miles Taylor / Christopher Krebs", "type": "individual", "country": "US", "description": "Taylor: former 'Anonymous' author, ex-DHS CoS; Krebs: former CISA director who certified 2020 election security"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "FBI", "DHS"], "amount_usd": null, "amount_note": "Krebs lost income after employer suspended access during security review", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Krebs suffered financial harm (loss of access to employer's systems)."}, "quid_pro_quo": {"alleged": false, "gave": "EO directing investigations against private citizens who criticized Trump", "received": "Retaliation against critics; deterrence of other officials from speaking out"}, "tags": ["prosecution", "retaliation", "executive_order", "krebs", "taylor", "rule_of_law", "election_security"], "last_updated": "2026-03-28", "sources": [{"title": "Trump signs executive order targeting Chris Krebs and Miles Taylor", "url": "https://www.politico.com/news/2025/04/09/trump-executive-order-krebs-taylor-00235001", "date": "2025-04-09", "outlet": "Politico", "type": "news"}, {"title": "Chris Krebs's employer suspends him after Trump EO targets him", "url": "https://www.nytimes.com/2025/04/10/us/politics/chris-krebs-sentinelone-trump-executive-order.html", "date": "2025-04-10", "outlet": "New York Times", "type": "news"}], "motivation": "political"}, {"id": "doj-actblue-eo-2025-04", "date": "2025-04-09", "date_end": null, "title": "Trump EO directs DOJ to investigate ActBlue — Democratic fundraising platform", "summary": "In April 2025, Trump signed an Executive Order directing the DOJ to investigate ActBlue, the dominant online fundraising platform used by Democratic candidates and organizations. The EO alleged ActBlue was involved in 'illegal straw donations' and foreign money funneling. ActBlue denied the allegations and noted that the accusations were recycled from discredited 2024 campaign-season claims. Legal experts said there was no public evidence supporting the allegations and that the EO appeared to be a political attack on Democratic fundraising infrastructure. Several Republican-aligned donors and politicians had floated the straw donation allegations during the 2024 campaign. The investigation, if conducted, would require ActBlue to spend significantly on legal defense and could deter donors.", "categories": ["retaliation_targeting", "power_abuse"], "status": "confirmed", "counterparty": {"name": "ActBlue", "type": "organization", "country": "US", "description": "Primary online fundraising platform for Democratic candidates and progressive organizations; processes billions in donations"}, "beneficiary": ["trump_personally", "republican_party"], "actors": ["Donald Trump", "DOJ", "Pam Bondi"], "amount_usd": null, "amount_note": "No direct financial amount; investigation would impose legal costs and chill Democratic fundraising", "financial_connection": {"exists": true, "description": "Targeting ActBlue would disrupt Democratic fundraising, benefiting Republican candidates including Trump's political allies."}, "quid_pro_quo": {"alleged": true, "gave": "DOJ investigation of Democratic fundraising platform", "received": "Political advantage: weakening Democratic campaign finance infrastructure"}, "tags": ["prosecution", "retaliation", "actblue", "democratic_party", "campaign_finance", "executive_order"], "last_updated": "2026-03-28", "sources": [{"title": "Trump signs EO directing DOJ to investigate ActBlue", "url": "https://www.politico.com/news/2025/04/09/trump-executive-order-actblue-investigation-00235002", "date": "2025-04-09", "outlet": "Politico", "type": "news"}], "motivation": "political"}, {"id": "doj-lisa-cook-investigation-2025", "date": "2025-03-01", "date_end": null, "title": "DOJ investigates Fed Reserve member Lisa Cook after she refuses to resign", "summary": "Federal Reserve Governor Lisa Cook, one of two Black women to serve on the Fed board, refused to resign when the Trump administration pressured Fed members to step down. Following her refusal, the DOJ opened a mortgage fraud investigation into her. Cook's appointment, made by Biden in 2022, runs until 2038. Trump had attacked Cook publicly, calling her an unqualified diversity hire. The Fed is constitutionally independent; the administration's pressure campaign against board members is seen by economists as an attempt to control monetary policy. The mortgage fraud investigation was widely seen as retaliation for Cook's refusal to comply with political pressure. Trump has publicly stated he wants to remove Fed Chair Jerome Powell.", "categories": ["retaliation_targeting", "power_abuse"], "status": "alleged", "counterparty": {"name": "Lisa Cook", "type": "government_official", "country": "US", "description": "Federal Reserve Governor; Biden appointee; refused to resign under Trump pressure; one of two Black women to serve on Fed board"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "DOJ", "White House"], "amount_usd": null, "amount_note": null, "financial_connection": {"exists": true, "description": "Controlling Fed Reserve monetary policy decisions is worth trillions in economic impact; Cook's removal would give Trump greater influence over interest rates and money supply."}, "quid_pro_quo": {"alleged": true, "gave": "DOJ investigation of a Fed board member who refused to resign", "received": "Pressure to resign; potential control over Federal Reserve composition and policy"}, "tags": ["prosecution", "retaliation", "federal_reserve", "lisa_cook", "alleged_political_motivation"], "last_updated": "2026-03-28", "sources": [{"title": "DOJ probes Fed Governor Lisa Cook after she refuses to quit", "url": "https://www.washingtonpost.com/business/2025/03/10/lisa-cook-federal-reserve-doj-investigation/", "date": "2025-03-10", "outlet": "Washington Post", "type": "news"}], "motivation": "political"}, {"id": "lawfirm-eo-perkins-coie-2025-03", "date": "2025-03-06", "date_end": "2025-05-02", "title": "Trump EO targets Perkins Coie — suspends clearances, bars federal access", "summary": "On March 6, 2025, Trump signed Executive Order 14230 targeting Perkins Coie, a law firm that had represented Hillary Clinton's 2016 campaign and other Democratic clients. The EO suspended all employee security clearances, barred firm members from entering federal buildings, and directed federal agencies to terminate all government contracts with the firm. The stated reason was the firm's association with the Steele dossier. The actual effect was to destroy the firm's ability to represent any client with federal regulatory exposure. Perkins Coie sued immediately. On May 2, 2025, a federal judge permanently blocked the order as 'an unprecedented attack' on the legal system, calling it 'null and void.' The DOJ later moved to drop its defense of the order.", "categories": ["coercion_threat", "power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "Perkins Coie", "type": "organization", "country": "US", "description": "Major law firm; represented Clinton 2016 campaign and other Democratic clients; blocked by EO 14230"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "White House Counsel's Office"], "amount_usd": null, "amount_note": "Loss of government contracts; cost to firm's reputation and clients' cases — not quantified publicly", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Retaliation for the firm's prior work on cases adverse to Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Destroyed firm's ability to work on federal matters", "received": "Retaliation against a firm that worked against Trump; deterrence for other firms"}, "tags": ["law_firm", "executive_order", "coercion", "security_clearances", "court_blocked"], "last_updated": "2026-03-28", "sources": [{"title": "Judge strikes down Trump's executive order targeting law firm Perkins Coie", "url": "https://www.aljazeera.com/news/2025/5/3/judge-strikes-down-trumps-executive-order-targeting-law-firm-perkins-coie", "date": "2025-05-03", "outlet": "Al Jazeera", "type": "news"}, {"title": "Trump's executive orders against law firms", "url": "https://firstamendment.mtsu.edu/article/trumps-executive-orders-against-law-firms/", "date": "2025-06-01", "outlet": "First Amendment Encyclopedia / MTSU", "type": "analysis"}], "motivation": "political"}, {"id": "lawfirm-paul-weiss-capitulation-2025-03", "date": "2025-03-14", "date_end": "2025-03-21", "title": "Paul Weiss capitulates to Trump — pledges $40M pro bono, ends DEI", "summary": "On March 14, 2025, Trump signed Executive Order 14237 targeting Paul Weiss, a prominent law firm. The EO suspended security clearances, barred federal building access, and directed contract terminations. The trigger was attorney Mark Pomerantz, a former Paul Weiss partner who had joined the Manhattan DA's office to help prosecute Trump. Rather than sue — as other firms did — Paul Weiss capitulated within a week. The firm pledged $40 million in pro bono work exclusively for Trump-approved causes (veterans, combating antisemitism), agreed to review and end DEI practices, and acknowledged the administration's concerns. Trump rescinded the EO on March 21. Legal commentators called it 'humiliating capitulation' and noted it set a precedent for the government coercing private firms through threat of debarment. Eight other major firms — Skadden, Milbank, Willkie Farr, Cadwalader, Kirkland & Ellis, A&O Shearman, Latham & Watkins, Simpson Thacher — made preemptive deals to avoid similar EOs, collectively pledging nearly $940 million in pro bono work for administration-approved causes.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Paul Weiss / Major US law firms", "type": "organization", "country": "US", "description": "Paul Weiss + 8 other firms (Skadden, Milbank, Willkie Farr, Cadwalader, Kirkland & Ellis, A&O Shearman, Latham & Watkins, Simpson Thacher) collectively pledged ~$940M in pro bono for Trump-approved causes"}, "beneficiary": ["trump_personally", "trump_allies"], "actors": ["Donald Trump", "White House Counsel's Office"], "amount_usd": 940000000, "amount_note": "Estimated $940M total pro bono pledges across 9 settling firms (Paul Weiss $40M + 8 others at $100-125M each)", "financial_connection": {"exists": true, "description": "Pro bono work directed by Trump to his preferred causes ($940M total). Firms gained relief from EOs that would have destroyed their federal business."}, "quid_pro_quo": {"alleged": false, "gave": "End DEI practices; pledge pro bono for Trump-approved causes; distance from anti-Trump attorneys", "received": "Rescission of EO / no EO issued; ability to continue federal government work"}, "tags": ["law_firm", "executive_order", "coercion", "pro_bono", "dei", "capitulation"], "last_updated": "2026-03-28", "sources": [{"title": "Trump rescinds executive order that targeted Paul Weiss law firm", "url": "https://news.bloomberglaw.com/business-and-practice/trump-rescinds-executive-order-that-targeted-paul-weiss-law-firm", "date": "2025-03-21", "outlet": "Bloomberg Law", "type": "news"}, {"title": "Paul Weiss executive order rescinded — White House statement", "url": "https://www.cbsnews.com/news/paul-weiss-executive-order-rescinded-white-house-trump/", "date": "2025-03-21", "outlet": "CBS News", "type": "news"}, {"title": "Milbank signs deal with Trump to avoid executive order", "url": "https://news.bloomberglaw.com/business-and-practice/milbank-signs-deal-with-trump-to-avoid-executive-order", "date": "2025-03-28", "outlet": "Bloomberg Law", "type": "news"}], "motivation": "both"}, {"id": "lawfirm-eo-jenner-wilmerhale-2025-03", "date": "2025-03-25", "date_end": "2025-05-27", "title": "Trump EOs target Jenner & Block, WilmerHale — both struck down as unconstitutional", "summary": "Trump signed Executive Order 14246 (March 25, 2025) targeting Jenner & Block — citing attorney Andrew Weissmann's work on the Mueller investigation — and Executive Order 14250 (March 27, 2025) targeting WilmerHale, which had employed Robert Mueller and represented the DNC and Biden/Harris campaigns. Both orders suspended security clearances, barred federal access, and directed contract terminations. Both firms sued immediately. Jenner & Block: Judge Bates issued an immediate TRO; on May 23, 2025 declared the EO unconstitutional as it 'seeks to chill legal representation the administration doesn't like.' WilmerHale: federal judge struck down the EO on May 27, 2025. The DOJ dropped its appeals in both cases. A presidential memorandum had earlier (February 25, 2025) targeted Covington & Burling over its attorneys' work for Jack Smith's special counsel investigation.", "categories": ["coercion_threat", "power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "Jenner & Block / WilmerHale / Covington & Burling", "type": "organization", "country": "US", "description": "Three firms targeted for employing attorneys who worked on Trump investigations (Mueller, Jack Smith). All EOs/memo struck down or challenged."}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "White House Counsel's Office"], "amount_usd": null, "amount_note": "Significant legal costs for all three firms to defend themselves; temporary loss of federal business", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Retaliation for firms employing prosecutors who investigated Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Suspension of ability to do federal work", "received": "Deterrence of other firms from employing attorneys who worked on Trump cases"}, "tags": ["law_firm", "executive_order", "coercion", "mueller", "jack_smith", "court_blocked", "unconstitutional"], "last_updated": "2026-03-28", "sources": [{"title": "Law firms sue Trump over executive orders targeting them", "url": "https://www.npr.org/2025/03/28/g-s1-56890/law-firms-sue-trump", "date": "2025-03-28", "outlet": "NPR", "type": "news"}, {"title": "Trump executive order targeting Jenner & Block unconstitutional, judge rules", "url": "https://www.nbcnews.com/politics/justice-department/trump-executive-order-targeting-jenner-law-firm-unconstitutional-judge-rcna205230", "date": "2025-05-23", "outlet": "NBC News", "type": "news"}, {"title": "WilmerHale executive order struck down by federal judge", "url": "https://www.washingtonpost.com/politics/2025/03/28/jenner-block-wilmer-hale-trump-law-firms-sue/", "date": "2025-03-28", "outlet": "Washington Post", "type": "news"}], "motivation": "political"}, {"id": "university-funding-columbia-2025-03", "date": "2025-03-07", "date_end": null, "title": "Columbia University capitulates after $400M funding cut — pays $220M+ to restore", "summary": "In March 2025, the Trump administration pulled more than $400 million in federal grants from Columbia University, explicitly linking the funding cut to Columbia's handling of pro-Palestinian protesters and campus demonstrations. The administration demanded Columbia change its disciplinary policies for protesters, place Middle Eastern, African, and South Asian studies programs under administrative control, and take other policy changes. Columbia largely capitulated to the demands — leading to the abrupt ouster of its interim president amid national backlash. The university agreed to pay the administration more than $220 million to restore federal funding. Critics called it the most consequential capitulation of any major American university to presidential pressure.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Columbia University", "type": "organization", "country": "US", "description": "Ivy League university in New York City; $400M in federal grants pulled; capitulated to demands over pro-Palestinian protest policies"}, "beneficiary": ["trump_personally", "republican_party"], "actors": ["Donald Trump", "Linda McMahon (Education Dept.)", "Department of Education"], "amount_usd": 400000000, "amount_note": "$400M+ in grants pulled; Columbia agreed to pay $220M+ to restore. Net federal leverage: hundreds of millions.", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Political leverage: forcing policy changes at elite universities."}, "quid_pro_quo": {"alleged": false, "gave": "Change protest discipline policies; restructure Middle East studies; pay $220M+", "received": "Restoration of federal funding"}, "tags": ["university", "federal_funding", "coercion", "dei", "columbia", "protest_policy"], "last_updated": "2026-03-28", "sources": [{"title": "Columbia University makes deal with Trump administration, agrees to pay more than $220 million to restore federal funding", "url": "https://www.pbs.org/newshour/politics/columbia-university-makes-deal-with-trump-administration-agrees-to-pay-more-than-220-million-to-restore-federal-funding", "date": "2025-04-21", "outlet": "PBS NewsHour", "type": "news"}], "motivation": "political"}, {"id": "university-funding-harvard-2025-04", "date": "2025-04-03", "date_end": null, "title": "Trump freezes $2.2B Harvard funding over DEI demands — Harvard refuses", "summary": "In April 2025, three federal agencies announced a review of approximately $8 billion in multi-year grants to Harvard University. After Harvard received a formal written list of demands — eliminate all DEI programs, ban masks at protests, derecognize pro-Palestinian student groups, audit academic departments for 'viewpoint diversity,' expel students involved in a 2023 protest altercation, and reform international student admissions to screen for those 'supportive of terrorism and antisemitism' — $2.2 billion in grants were immediately frozen after Harvard rejected the demands. Harvard was the only major American university to publicly refuse to comply. As of March 2026, nearly $9 billion in funding remains at risk and the legal battle is ongoing. The administration also threatened to revoke Harvard's tax-exempt status and threatened to bar international students from enrolling.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Harvard University", "type": "organization", "country": "US", "description": "Oldest US university; $8B+ in federal grants at risk; refused Trump's DEI and protest policy demands; only major university to publicly resist"}, "beneficiary": ["trump_personally", "republican_party"], "actors": ["Donald Trump", "Department of Education", "HHS", "NSF"], "amount_usd": 2200000000, "amount_note": "$2.2B immediately frozen; up to $9B total at risk across multiple agencies", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Political pressure campaign against elite liberal university."}, "quid_pro_quo": {"alleged": false, "gave": "Demands: eliminate DEI, restructure admissions, expel students, audit departments", "received": "Restoration of federal funding — Harvard has refused"}, "tags": ["university", "federal_funding", "coercion", "dei", "harvard", "protest_policy", "refused_to_comply"], "last_updated": "2026-03-28", "sources": [{"title": "Harvard's $2.3bn gamble: what Trump demanded, how the university resisted", "url": "https://www.aljazeera.com/news/2025/4/15/harvards-2-3bn-gamble-what-trump-demanded-how-the-university-resisted", "date": "2025-04-15", "outlet": "Al Jazeera", "type": "news"}, {"title": "Trump administration freezes $2.2 billion in Harvard grants", "url": "https://www.cnbc.com/2025/04/14/trump-harvard-deal-funding-billion-dei.html", "date": "2025-04-14", "outlet": "CNBC", "type": "news"}, {"title": "What Harvard demanded Trump — the full list of federal demands", "url": "https://www.thecrimson.com/article/2025/4/4/harvard-federal-funding-demands/", "date": "2025-04-04", "outlet": "Harvard Crimson", "type": "news"}], "motivation": "political"}, {"id": "university-funding-other-2025-04", "date": "2025-03-19", "date_end": null, "title": "Federal funding frozen at Penn ($175M), Princeton ($210M), Brown ($510M), Cornell ($1B+), Northwestern ($790M)", "summary": "In March and April 2025, the Trump administration froze federal funding at multiple major universities as leverage to force policy changes on DEI programs, protest discipline, and antisemitism policies. University of Pennsylvania: $175M frozen (March 19) — linked to its past policy permitting a transgender swimmer to compete on the women's team. Princeton: $210M frozen (April 1). Brown: $510M frozen (April 3). Cornell: over $1B frozen (April 8). Northwestern: $790M frozen (April 8) — Northwestern ultimately settled, paying the Trump administration $75 million. University of Pennsylvania rejected a subsequent 'higher education compact' from the administration (October 2025) that would have restored funding priority in exchange for eliminating DEI and limiting foreign student enrollment.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "University of Pennsylvania / Princeton / Brown / Cornell / Northwestern", "type": "organization", "country": "US", "description": "Five major research universities had federal funding frozen as leverage for DEI and protest policy changes; Northwestern paid $75M to settle"}, "beneficiary": ["trump_personally", "republican_party"], "actors": ["Donald Trump", "Department of Education", "HHS"], "amount_usd": 2685000000, "amount_note": "Approximate total frozen: Penn $175M + Princeton $210M + Brown $510M + Cornell $1B + Northwestern $790M = ~$2.7B. Northwestern settled for $75M.", "financial_connection": {"exists": false, "description": "No direct Trump financial benefit. Political pressure against universities seen as liberal institutions."}, "quid_pro_quo": {"alleged": false, "gave": "DEI elimination; protest discipline reform; policy compliance", "received": "Restoration of federal funding"}, "tags": ["university", "federal_funding", "coercion", "dei", "trans_athlete", "protest_policy"], "last_updated": "2026-03-28", "sources": [{"title": "What to know about Trump's funding threats to colleges", "url": "https://www.insidehighered.com/news/government/politics-elections/2025/04/18/what-know-about-trumps-funding-threats-colleges", "date": "2025-04-18", "outlet": "Inside Higher Ed", "type": "news"}, {"title": "Penn rejects Trump's higher education compact", "url": "https://www.highereddive.com/news/penn-rejects-trumps-higher-education-compact/803078/", "date": "2025-10-15", "outlet": "Higher Ed Dive", "type": "news"}], "motivation": "political"}, {"id": "media-abc-disney-settlement-2025-01", "date": "2024-12-16", "date_end": "2025-01-10", "title": "ABC/Disney pays $15M to Trump library to settle Stephanopoulos defamation suit", "summary": "In December 2024 (finalized January 2025), ABC and Disney settled a defamation lawsuit brought by Trump over anchor George Stephanopoulos's statements that Trump had been found 'liable for rape' in the E. Jean Carroll case (the jury found him liable for sexual abuse, not rape, though the judge later said the finding was consistent with rape). ABC/Disney paid $15 million to Trump's presidential library foundation and issued a public apology. Legal observers noted the settlement was influenced by the implicit threat of FCC regulatory action against ABC's broadcast licenses — FCC Chairman Brendan Carr, a Trump appointee, simultaneously held life-or-death power over ABC's affiliate stations. The settlement came before Trump's inauguration but was widely seen as shaped by the incoming administration's regulatory power.", "categories": ["coercion_threat", "business_payment"], "status": "confirmed", "counterparty": {"name": "ABC / Disney", "type": "organization", "country": "US", "description": "ABC News and parent company Disney; Stephanopoulos lawsuit settled; $15M to Trump presidential library; implicit FCC leverage"}, "beneficiary": ["trump_personally", "trump_org"], "actors": ["Donald Trump", "FCC Chairman Brendan Carr"], "amount_usd": 15000000, "amount_note": "$15M to Trump presidential library foundation; public apology issued", "financial_connection": {"exists": true, "description": "$15M goes directly to Trump presidential library — a Trump-controlled entity. Settlement enabled by implicit FCC regulatory threat over ABC broadcast licenses."}, "quid_pro_quo": {"alleged": true, "gave": "$15M to Trump library; public apology; coverage chilling effect", "received": "Settlement of lawsuit; relief from implicit FCC threat to ABC broadcast licenses"}, "tags": ["media", "fcc", "lawsuit", "settlement", "coercion", "library", "abc", "disney", "stephanopoulos"], "last_updated": "2026-03-28", "sources": [{"title": "ABC agrees to pay $15 million to Trump's presidential library to settle defamation lawsuit", "url": "https://www.pbs.org/newshour/politics/abc-agrees-to-pay-15-million-to-trumps-presidential-library-to-settle-defamation-lawsuit", "date": "2024-12-16", "outlet": "PBS NewsHour", "type": "news"}, {"title": "ABC settles with Trump for $15 million — now he wants to sue other news outlets", "url": "https://www.npr.org/2024/12/16/nx-s1-5230274/abc-settles-with-trump-for-15-million-now-he-wants-to-sue-other-news-outlets", "date": "2024-12-16", "outlet": "NPR", "type": "news"}], "motivation": "both"}, {"id": "media-cbs-paramount-settlement-2025-07", "date": "2025-07-01", "date_end": "2025-07-24", "title": "Paramount/CBS pays $16M to Trump library — FCC merger approval granted 23 days later", "summary": "On July 1, 2025, Paramount Global (parent of CBS) settled a lawsuit Trump had brought over a CBS '60 Minutes' interview with Kamala Harris, in which CBS edited Harris's answer about Gaza. Trump alleged the editing was politically manipulative. Paramount paid $16 million to Trump's presidential library foundation. Critically, Paramount simultaneously needed FCC approval to complete its $8 billion merger with Skydance Media. FCC Chairman Brendan Carr (a Trump appointee) had delayed the merger review. The Skydance deal was approved on July 24, 2025 — 23 days after the settlement. Senators described the settlement as potentially 'an illegal bribe' in exchange for merger clearance. In a reported side deal, Skydance also agreed to give Trump $20 million in advertising and public service announcements, bringing the total value of the deal to at least $36 million. CBS newsroom staff reported significant internal turmoil over the settlement's implications for editorial independence.", "categories": ["coercion_threat", "business_payment"], "status": "confirmed", "counterparty": {"name": "CBS / Paramount Global / Skydance", "type": "organization", "country": "US", "description": "CBS parent Paramount needed FCC approval for Skydance merger; settled 60 Minutes lawsuit for $16M to Trump library; merger approved 23 days later"}, "beneficiary": ["trump_personally", "trump_org"], "actors": ["Donald Trump", "FCC Chairman Brendan Carr", "Paramount Global", "Skydance Media"], "amount_usd": 36000000, "amount_note": "$16M to Trump presidential library + $20M in advertising/PSAs from Skydance = $36M total; FCC merger approval granted 23 days after settlement", "financial_connection": {"exists": true, "description": "$16M flows directly to Trump presidential library. Skydance agreed to $20M in ads/PSAs for Trump. FCC merger approval was the leverage: Paramount's $8B merger required FCC sign-off while Trump controlled the FCC."}, "quid_pro_quo": {"alleged": true, "gave": "$16M to Trump library; $20M in Skydance advertising; retraction of editorial stance", "received": "FCC approval of Paramount-Skydance merger (approved July 24, 23 days after settlement)"}, "tags": ["media", "fcc", "lawsuit", "settlement", "coercion", "library", "cbs", "paramount", "merger", "60_minutes"], "last_updated": "2026-03-28", "sources": [{"title": "CBS and Trump settle lawsuit over 60 Minutes Kamala Harris interview", "url": "https://www.cnn.com/2025/07/02/media/cbs-trump-60-minutes-paramount-settlement", "date": "2025-07-02", "outlet": "CNN", "type": "news"}, {"title": "Trump lawsuit against Paramount — CBS 60 Minutes, Kamala Harris", "url": "https://www.npr.org/2025/07/02/nx-s1-5290171/trump-lawsuit-paramount-cbs-60-minutes-kamala-harris", "date": "2025-07-02", "outlet": "NPR", "type": "news"}, {"title": "Paramount's Trump lawsuit settlement — curtain call for the First Amendment", "url": "https://knightcolumbia.org/blog/paramounts-trump-lawsuit-settlement-curtain-call-for-the-first-amendment", "date": "2025-07-10", "outlet": "Knight First Amendment Institute", "type": "analysis"}], "motivation": "both"}, {"id": "media-fcc-broadcast-license-threats-2025", "date": "2025-09-19", "date_end": "2026-03-14", "title": "FCC threatens to revoke broadcast licenses of ABC, NBC, CBS over news coverage", "summary": "FCC Chairman Brendan Carr, a Trump appointee, repeatedly threatened to revoke or not renew broadcast licenses of major television networks — ABC, NBC, and CBS — over their news coverage. On September 19, 2025, Trump called ABC and NBC 'two of the worst and most biased networks in history' and suggested license revocation would 'be up to' FCC Chairman Carr. Carr had previously (in a 2025 incident) pressured ABC into pulling Jimmy Kimmel's show from one night of programming after Kimmel made a comment about the assassination of Charlie Kirk. In March 2026, Carr threatened broadcasters' local station licenses over their coverage of the US-Iran war. Legal experts noted that revoking the licenses of major broadcast networks is procedurally nearly impossible and would take years — but the threat created a documented chilling effect on coverage and editorial decisions.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "ABC / NBC / CBS broadcast networks", "type": "organization", "country": "US", "description": "The three major US broadcast networks targeted with FCC license revocation threats over news coverage Trump disliked"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump", "FCC Chairman Brendan Carr", "FCC"], "amount_usd": null, "amount_note": "No direct financial transaction; economic value is the chilling effect on media coverage of Trump", "financial_connection": {"exists": false, "description": "No direct financial benefit to Trump. Control over media narrative through regulatory intimidation."}, "quid_pro_quo": {"alleged": true, "gave": "Threat of license revocation over unfavorable coverage", "received": "Chilling effect on coverage; documented self-censorship (Kimmel show pulled, other decisions)"}, "tags": ["media", "fcc", "broadcast_license", "coercion", "press_freedom", "iran_war", "chilling_effect"], "last_updated": "2026-03-28", "sources": [{"title": "Trump threatening broadcast station licenses — explained", "url": "https://www.cnbc.com/2025/09/19/trump-threatening-broadcast-station-licenses-explained.html", "date": "2025-09-19", "outlet": "CNBC", "type": "news"}, {"title": "FCC threatens TV broadcast licenses over Iran war news coverage", "url": "https://fortune.com/2026/03/14/fcc-brendan-carr-tv-broadcast-licenses-news-coverage-us-war-iran-trump/", "date": "2026-03-14", "outlet": "Fortune", "type": "news"}, {"title": "FCC Brendan Carr threat to news networks — broadcast license", "url": "https://www.cbsnews.com/news/fcc-brendan-carr-threat-news-networks-broadcast-license/", "date": "2026-03-14", "outlet": "CBS News", "type": "news"}], "motivation": "political"}, {"id": "trump-nyt-lawsuit-2025-09", "date": "2025-09-16", "date_end": null, "title": "Trump files $15B defamation lawsuit against New York Times", "summary": "In September 2025, Trump filed a $15 billion defamation and libel lawsuit against the New York Times over a book and several articles. A federal judge in Tampa dismissed the original complaint as 'decidedly improper and impermissible' but allowed refiling within 28 days. Trump refiled in October 2025. The lawsuit is widely regarded by First Amendment lawyers as meritless and legally frivolous under the actual malice standard established in New York Times v. Sullivan — but the cost of defending the lawsuit is itself significant. Critics including press freedom organizations called the suit an attempt to intimidate the Times and chill its reporting on Trump. Trump has also publicly called for the Supreme Court to revisit and overturn the New York Times v. Sullivan precedent.", "categories": ["coercion_threat", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "New York Times", "type": "organization", "country": "US", "description": "Major US newspaper; sued for $15B by Trump; dismissed once, refiled; Trump has called for overturning NYT v. Sullivan press protection precedent"}, "beneficiary": ["trump_personally"], "actors": ["Donald Trump"], "amount_usd": 15000000000, "amount_note": "$15B claimed in lawsuit; considered legally frivolous by First Amendment lawyers; actual value is chilling effect on coverage", "financial_connection": {"exists": false, "description": "No direct financial benefit expected. Lawsuit is widely seen as harassment and intimidation of press."}, "quid_pro_quo": {"alleged": true, "gave": "Existential legal threat requiring significant defense resources", "received": "Potential chilling effect on Times' reporting on Trump"}, "tags": ["media", "lawsuit", "coercion", "press_freedom", "nyt", "defamation"], "last_updated": "2026-03-28", "sources": [{"title": "Trump files $15 billion lawsuit against the New York Times", "url": "https://www.npr.org/2025/09/16/nx-s1-5543030/donald-trump-nytimes-lawsuit", "date": "2025-09-16", "outlet": "NPR", "type": "news"}], "motivation": "political"}, {"id": "intel-chips-act-coercion-2025-08", "date": "2025-08-01", "date_end": "2025-08-22", "title": "Trump withholds CHIPS Act funds — forces Intel to give US government 10% equity stake", "summary": "Intel had been awarded $8.9 billion in CHIPS Act grants by the Biden administration to fund domestic semiconductor manufacturing. Trump withheld the congressionally approved funds and, two weeks before Intel agreed to the deal, publicly called for Intel CEO Lip-Bu Tan to resign, alleging problematic ties to China. Intel agreed to give the US government a 10% equity stake in the company in exchange for release of the $8.9 billion in CHIPS Act funds (August 2025). Commerce Secretary Lutnick confirmed the equity stake was part of the deal. The administration indicated it may seek similar equity arrangements from other CHIPS Act recipients. Critics noted this was an unprecedented use of congressionally approved funding as leverage to extract equity from private corporations.", "categories": ["coercion_threat", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Intel Corporation", "type": "organization", "country": "US", "description": "US semiconductor company; had $8.9B CHIPS Act funding withheld; forced to give US government 10% equity stake to receive congressionally approved funds"}, "beneficiary": ["us_government"], "actors": ["Donald Trump", "Howard Lutnick (Commerce Secretary)", "Department of Commerce"], "amount_usd": 8900000000, "amount_note": "$8.9B in CHIPS Act funds released in exchange for 10% government equity stake in Intel", "financial_connection": {"exists": true, "description": "US government acquired 10% equity stake in Intel (a private corporation) as condition for releasing congressionally approved CHIPS Act funds. Unprecedented use of funding leverage to extract corporate equity."}, "quid_pro_quo": {"alleged": false, "gave": "10% equity stake in Intel to US government", "received": "Release of $8.9B in CHIPS Act funds that had been withheld"}, "tags": ["chips_act", "coercion", "intel", "semiconductor", "equity_stake", "corporate_coercion"], "last_updated": "2026-03-28", "sources": [{"title": "Trump says US government will take stake in Intel", "url": "https://www.npr.org/2025/08/22/nx-s1-5509673/trump-says-us-government-will-take-stake-intel", "date": "2025-08-22", "outlet": "NPR", "type": "news"}, {"title": "Lutnick: Intel equity stake part of CHIPS Act deal", "url": "https://www.cnbc.com/2025/08/19/lutnick-intel-stock-chips-trump.html", "date": "2025-08-19", "outlet": "CNBC", "type": "news"}], "motivation": "political"}, {"id": "trump-jr-1789-capital-pentagon-2025", "date": "2025-04-01", "date_end": null, "title": "Don Jr. joins 1789 Capital — 4 portfolio companies get $735M+ in Pentagon contracts", "summary": "Shortly after Trump's election victory, Donald Trump Jr. joined venture capital firm 1789 Capital as a partner. Trump Jr. also screened candidates for senior Pentagon roles during the transition, specifically seeking officials who supported increased drone spending. After inauguration, Defense Secretary Pete Hegseth issued directives increasing drone procurement. At least four companies in 1789 Capital's portfolio then received Pentagon contracts or loans totaling over $735 million: Cerebras Systems ($45M AI contract, April 2025); PsiQuantum ($10.8M Air Force contract); Firehawk Aerospace ($4.9M Air Force contract, August 2025); Vulcan Elements — a 30-person rare-earth magnet startup — received a $620M Pentagon loan (the largest in Pentagon Office of Strategic Capital history) just three months after 1789 invested in it. The $620M loan was worth more than twice Vulcan's entire valuation at the time of investment. Senators Warren, Blumenthal, and Kim warned DoD had no plan to prevent Trump family profiting from defense contracts.", "categories": ["family_enrichment", "investment_favoritism", "power_abuse"], "status": "confirmed", "motivation": "financial", "counterparty": {"name": "1789 Capital / Vulcan Elements / Cerebras / Unusual Machines", "type": "organization", "country": "US", "description": "VC fund co-founded by Trump Jr.; portfolio companies received $735M+ in Pentagon contracts/loans after Trump Jr. screened Pentagon transition officials"}, "beneficiary": ["trump_family"], "actors": ["Donald Trump Jr.", "1789 Capital", "Pete Hegseth", "Pentagon"], "amount_usd": 735000000, "amount_note": "$620M Vulcan Elements loan + $45M Cerebras + $10.8M PsiQuantum + $4.9M Firehawk + Unusual Machines Army contract = $735M+ total to 1789 portfolio companies", "financial_connection": {"exists": true, "description": "Trump Jr. is a partner in 1789 Capital, which invested in all four companies. He screened Pentagon transition officials for pro-drone views. Hegseth then issued pro-drone procurement directives. Portfolio companies then received unprecedented contracts."}, "quid_pro_quo": {"alleged": true, "gave": "Pentagon contracts and loans worth $735M+ to companies in Trump Jr.'s investment portfolio", "received": "Trump Jr. profits as 1789 Capital partner; portfolio company valuations boosted by government contracts"}, "tags": ["pentagon", "defense_contracts", "drones", "trump_jr", "1789_capital", "conflict_of_interest", "vulcan_elements", "cerebras"], "last_updated": "2026-03-28", "sources": [{"title": "Company backed by Donald Trump Jr.'s firm nabs $620M government contract", "url": "https://techcrunch.com/2025/12/03/company-backed-by-donald-trump-jr-s-firm-nabs-620m-government-contract/", "date": "2025-12-03", "outlet": "TechCrunch", "type": "news"}, {"title": "Warren, Blumenthal, Kim sound alarm on Trump Jr.-linked Pentagon contracts", "url": "https://www.warren.senate.gov/newsroom/press-releases/warren-blumenthal-kim-sound-alarm-on-potential-for-donald-trump-jr-linked-companies-to-profit-off-department-of-defense-contract-awards-loans", "date": "2026-01-22", "outlet": "Sen. Elizabeth Warren", "type": "congressional"}, {"title": "Democratic senators sound the alarm on Pentagon backing firms linked to Donald Trump Jr.", "url": "https://www.cnn.com/2026/01/23/business/donald-trump-jr-conflicts-of-interest-defense-1789", "date": "2026-01-23", "outlet": "CNN", "type": "news"}, {"title": "Pentagon has no plan to stop Trump sons profiting from defense contracts: Warren, Blumenthal", "url": "https://www.cnbc.com/2026/03/25/warren-pentagon-corruption-trump-children.html", "date": "2026-03-25", "outlet": "CNBC", "type": "news"}]}, {"id": "trump-sons-powerus-drone-iran-war-2026", "date": "2026-02-28", "date_end": null, "title": "Eric Trump and Don Jr. invest in drone maker Powerus — coinciding with US-Iran war", "summary": "Eric Trump and Donald Trump Jr. are merging their publicly traded golf-course holding company with Powerus, a Florida-based drone company, with the goal of filling gaps left by the Trump administration's ban on Chinese drones. The US-Israel war on Iran began February 28, 2026, creating massive demand for drones. The Trump administration simultaneously made domestic drone supply a national security priority through its Drone Dominance initiative, earmarking $1.1 billion for American-made drone procurement by 2027. Eric Trump was confirmed to have invested in Powerus shortly before the Iran war began. Snopes verified the Eric Trump drone investment claim as true. Critics including Responsible Statecraft and Common Dreams noted that the president's sons were positioned to profit directly from a war started by their father's administration.", "categories": ["family_enrichment", "investment_favoritism", "arms_deal_conflict"], "status": "confirmed", "motivation": "financial", "counterparty": {"name": "Powerus / US Drone industry", "type": "organization", "country": "US", "description": "Florida drone company merged with Trump sons' golf holding company; benefits from $1.1B Drone Dominance initiative and US-Iran war demand"}, "beneficiary": ["trump_family"], "actors": ["Eric Trump", "Donald Trump Jr.", "Donald Trump", "Pentagon", "Powerus"], "amount_usd": 1100000000, "amount_note": "$1.1B Pentagon Drone Dominance initiative earmarked for US-made drones; Powerus and Unusual Machines positioned to capture significant share", "financial_connection": {"exists": true, "description": "Trump sons directly own stakes in Powerus. Trump administration's Drone Dominance initiative and Chinese drone ban creates massive government-funded demand for companies like Powerus that the sons own."}, "quid_pro_quo": {"alleged": true, "gave": "$1.1B drone procurement initiative + Chinese drone ban = captive market for Trump sons' drone investment", "received": "Trump sons' drone company valuations surge as the only government-approved domestic alternative"}, "tags": ["drones", "iran_war", "pentagon", "eric_trump", "trump_jr", "powerus", "conflict_of_interest"], "last_updated": "2026-03-28", "sources": [{"title": "New drone maker partly owned by Trump sons hopes to win Pentagon contracts", "url": "https://www.military.com/daily-news/2026/03/12/new-drone-maker-partly-owned-trump-sons-hopes-win-pentagon-contracts.html", "date": "2026-03-12", "outlet": "Military.com", "type": "news"}, {"title": "Eric Trump invested in drone maker shortly before Iran war", "url": "https://www.snopes.com/fact-check/eric-trump-drone-company-iran-war/", "date": "2026-03-15", "outlet": "Snopes", "type": "analysis"}, {"title": "Trump wages war, his sons get payoff through savvy investments", "url": "https://responsiblestatecraft.org/trump-sons-iran/", "date": "2026-03-15", "outlet": "Responsible Statecraft", "type": "analysis"}]}, {"id": "kushner-affinity-ea-deal-cfius-2025-09", "date": "2025-09-30", "date_end": null, "title": "Kushner's Affinity Partners brokers $55B EA buyout — gets CFIUS favorable treatment", "summary": "In September 2025, Jared Kushner's private equity firm Affinity Partners — funded primarily by Saudi Arabia's Public Investment Fund ($2 billion) — brokered the $55 billion buyout of video game company Electronic Arts in the largest private-equity deal in history, alongside Silver Lake and Saudi Arabia's PIF. Kushner personally brokered the initial connection between EA and the Saudi PIF and was a central figure in months of talks. Ethics experts noted Kushner's involvement was expected to ease the deal through CFIUS (Committee on Foreign Investment in the US), the body that reviews national security implications of foreign acquisitions — because Kushner's father-in-law controls the executive branch that oversees CFIUS. Affinity Partners' assets surged to $6.2 billion at end of 2025, largely from Saudi backing. On a $2 billion Saudi investment, Affinity earns $25 million annually in management fees plus profit share. By March 2026, Kushner's fund had grown to $6.2B — from Saudi money invested during and after Kushner served as Senior Advisor to the President.", "categories": ["family_enrichment", "investment_favoritism", "foreign_investment"], "status": "confirmed", "motivation": "financial", "counterparty": {"name": "Saudi Public Investment Fund / Electronic Arts", "type": "foreign_government", "country": "SA", "description": "Saudi sovereign wealth fund: $2B investor in Kushner's Affinity Partners; co-buyer in $55B EA deal that Kushner brokered and which benefits from CFIUS approval Kushner is positioned to ease"}, "beneficiary": ["kushner"], "actors": ["Jared Kushner", "Affinity Partners", "Saudi PIF", "Silver Lake", "Electronic Arts"], "amount_usd": 55000000000, "amount_note": "$55B EA deal; Kushner earns management fees + carry. Affinity assets grew to $6.2B — up from ~$2B at start of term. Saudi PIF pays $25M/yr in fees alone.", "financial_connection": {"exists": true, "description": "Kushner's Affinity Partners is funded by Saudi Arabia ($2B) and other Middle East sovereign wealth funds. He brokered a $55B deal for his Saudi investors that also benefits Affinity's fee income. CFIUS review of Saudi acquisition would normally be stringent — but Kushner's family relationship gives him unique access to smooth approval."}, "quid_pro_quo": {"alleged": true, "gave": "Brokerage of $55B deal; implied CFIUS facilitation; continued access and influence", "received": "$25M/yr management fees; carried interest; Affinity AUM growth to $6.2B"}, "tags": ["kushner", "saudi_arabia", "affinity_partners", "cfius", "electronic_arts", "private_equity", "conflict_of_interest"], "last_updated": "2026-03-28", "sources": [{"title": "Kushner's Secret Saudi Talks Paved Way for $55 Billion EA Deal", "url": "https://www.bloomberg.com/news/articles/2025-09-30/kushner-s-secret-saudi-talks-paved-way-for-55-billion-ea-deal", "date": "2025-09-30", "outlet": "Bloomberg", "type": "news"}, {"title": "Kushner's Affinity Partners Assets Surge to $6.2 Billion on Mideast Backing", "url": "https://www.bloomberg.com/news/articles/2026-03-23/kushner-fund-backed-by-mideast-saw-assets-jump-to-6-2-billion", "date": "2026-03-23", "outlet": "Bloomberg", "type": "news"}, {"title": "Jared Kushner's double life", "url": "https://popular.info/p/jared-kushners-double-life", "date": "2026-01-15", "outlet": "Popular Information", "type": "analysis"}]}, {"id": "wlfi-binance-sec-dropped-2025", "date": "2025-09-01", "date_end": null, "title": "Trump's WLFI stablecoin USD1 integrated by Binance — after SEC drops Binance charges", "summary": "In September 2025, Binance — the world's largest crypto exchange — listed World Liberty Financial's WLFI token and began integrating USD1, the Trump family's stablecoin, into its trading pairs and collateral system. In December 2025, Binance added
