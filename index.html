<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trump Money Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent: #e74c3c;
    --accent2: #3498db;
    --gold: #f1c40f;
    --green: #2ecc71;
    --orange: #e67e22;
    --purple: #9b59b6;
    --radius: 8px;
    --sidebar-w: 240px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .stat {
    text-align: right;
  }
  .stat-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  nav {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px 0 24px;
  }
  .nav-section {
    padding: 12px 14px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 14px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    gap: 6px;
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .nav-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nav-btn .count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* ── Main content ── */
  main {
    flex: 1;
    overflow: auto;
    padding: 20px 24px;
  }

  .view-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .view-title {
    font-size: 18px;
    font-weight: 700;
  }
  .view-count {
    color: var(--text-dim);
    font-size: 13px;
  }
  .view-total {
    margin-left: auto;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }

  /* Search */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent2); }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: " ▲"; color: var(--accent2); }
  thead th.sort-desc::after { content: " ▼"; color: var(--accent2); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.expanded { background: var(--surface2); }

  td {
    padding: 10px 12px;
    vertical-align: top;
    max-width: 0;
  }

  .td-date { white-space: nowrap; color: var(--text-dim); font-size: 12px; width: 90px; }
  .td-amount {
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    text-align: right;
    width: 130px;
  }
  .td-amount.zero { color: var(--text-dim); font-weight: normal; }
  .td-who { font-weight: 500; }
  .td-title { font-weight: 500; }
  .td-title .title-text {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Expanded detail row */
  .detail-row td {
    padding: 0;
    background: #12151f;
    border-bottom: 2px solid var(--accent);
  }
  .detail-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    font-size: 13px;
  }
  .detail-inner.single { grid-template-columns: 1fr; }
  .detail-block h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .detail-block p { line-height: 1.6; color: var(--text); }
  .source-list { list-style: none; }
  .source-list li { margin-bottom: 4px; }
  .source-list a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 12px;
  }
  .source-list a:hover { text-decoration: underline; }
  .source-meta {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: 4px;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin: 1px 2px 1px 0;
    white-space: nowrap;
  }
  .badge-status-confirmed  { background: #1a4a2e; color: #2ecc71; }
  .badge-status-alleged    { background: #4a3000; color: #f1c40f; }
  .badge-status-suspected  { background: #2d1a4a; color: #9b59b6; }
  .badge-status-denied     { background: #3a1a1a; color: #e74c3c; }

  .badge-owed-private { background: #4a2000; color: #e67e22; }
  .badge-owed-govt    { background: #00294a; color: #3498db; }
  .badge-owed-both    { background: #2a004a; color: #9b59b6; }

  .badge-type-pardon      { background: #1a3a2a; color: #27ae60; }
  .badge-type-commutation { background: #2a2a00; color: #f1c40f; }
  .badge-type-mass_pardon { background: #3a0000; color: #e74c3c; }

  .badge-fin-yes  { background: #3a0000; color: #e74c3c; font-weight: 700; }
  .badge-fin-no   { background: #1a2a1a; color: #7f8c8d; }
  .badge-pol-yes  { background: #2a1a00; color: #e67e22; }

  .badge-qpq { background: #3a0000; color: #e74c3c; font-weight: 700; }

  .cat-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin: 1px 2px 1px 0;
    color: #fff;
    white-space: nowrap;
  }

  /* Beneficiary chips */
  .ben-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-dim);
    margin: 1px;
    white-space: nowrap;
    border: 1px solid var(--border);
  }

  /* Pardon-specific */
  .td-forgiven { font-weight: 700; text-align: right; white-space: nowrap; }
  .forgiven-total { color: var(--accent); }
  .forgiven-part  { color: var(--text-dim); font-size: 12px; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a5070; }

  @media (max-width: 768px) {
    nav { width: 180px; }
    .detail-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Trump Money Map <span>— Second Presidency, Jan 2025–</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val">69</div>
      <div class="stat-label">Incidents</div>
    </div>
    <div class="stat">
      <div class="stat-val">58</div>
      <div class="stat-label">Pardons</div>
    </div>
    <div class="stat">
      <div class="stat-val">$1.57B</div>
      <div class="stat-label">Pardons Forgiven</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="view-total-header"></div>
      <div class="stat-label">Current View</div>
    </div>
  </div>
</header>

<div class="app">
  <nav id="sidebar">
    <div class="nav-section">Incidents</div>
    <button class="nav-btn" onclick="showView('all-incidents')" id="btn-all-incidents">
      <span class="dot" style="background:#e74c3c"></span>
      All Incidents
      <span class="count">69</span>

    <div id="cat-buttons"></div>

    <div class="nav-divider"></div>
    <div class="nav-section">Pardons</div>

      <span class="dot" style="background:#27ae60"></span>
      All Pardons
      <span class="count">58</span>
    </button>
    <button class="nav-btn" onclick="showView('pardons-financial')" id="btn-pardons-financial">
      <span class="dot" style="background:#e74c3c"></span>
      Financial Connection
    </button>
    <button class="nav-btn" onclick="showView('pardons-political')" id="btn-pardons-political">
      <span class="dot" style="background:#e67e22"></span>
      Political Connection
    </button>
    <button class="nav-btn" onclick="showView('pardons-private-victims')" id="btn-pardons-private-victims">
      <span class="dot" style="background:#e67e22"></span>
      Victims = Private
    </button>
    <button class="nav-btn" onclick="showView('pardons-govt')" id="btn-pardons-govt">
      <span class="dot" style="background:#3498db"></span>
      Victims = Taxpayers
    </button>

    <div class="nav-divider"></div>
    <div class="nav-section">Incidents by Motivation</div>
    <button class="nav-btn" onclick="showView('motivation-financial')" id="btn-motivation-financial">
      <span class="dot" style="background:#f1c40f"></span>
      Financial
      <span class="count">26</span>
    </button>
    <button class="nav-btn" onclick="showView('motivation-political')" id="btn-motivation-political">
      <span class="dot" style="background:#3498db"></span>
      Political
      <span class="count">29</span>
    </button>
    <button class="nav-btn" onclick="showView('motivation-both')" id="btn-motivation-both">
      <span class="dot" style="background:#9b59b6"></span>
      Financial + Political
      <span class="count">14</span>
    </button>

    <div class="nav-divider"></div>
    <div class="nav-section">Rule of Law</div>
    <button class="nav-btn" onclick="showView('constitutional')" id="btn-constitutional">
      <span class="dot" style="background:#e74c3c"></span>
      Constitutional Violations
      <span class="count">12</span>
    </button>
  </nav>

  <main>
    <div class="view-header">
      <div class="view-title" id="view-title">All Incidents</div>
      <div class="view-count" id="view-count"></div>
      <div class="view-total" id="view-total"></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search name, title, counterparty, offense…" oninput="applySearch()">
    </div>
    <div class="table-wrap">
      <div id="table-container"></div>
    </div>
  </main>
</div>

ucation Secretary)", "Columbia University"], "amount_usd": 400000000, "amount_note": "$400M cut initially; $200M+ settlement paid to regain funding", "financial_connection": {"exists": false, "description": "No direct financial benefit to Trump — coercive model of funding denial and compliance"}, "quid_pro_quo": {"alleged": false, "gave": "Restoration of some federal research funding", "received": "$200M+ from Columbia; agreement to federal governance oversight"}, "sources": [{"title": "Trump Threatened Harvard's and Columbia's Funding. A Year Later, Only Harvard Is Still Fighting.", "url": "https://www.columbiaspectator.com/the-eye/2026/03/13/trump-threatened-harvards-and-columbias-funding-a-year-later-only-harvard-is-still-fighting/", "date": "2026-03-13", "outlet": "Columbia Spectator", "type": "news"}, {"title": "Trump brings elite institutions to heel in $1.2 billion settlement spree", "url": "https://www.axios.com/2025/07/30/trump-harvard-settlement-dei-lawsuit", "date": "2025-07-30", "outlet": "Axios", "type": "news"}], "tags": ["retaliation", "university", "Columbia", "DEI", "research_funding", "settlement"], "last_updated": "2026-03-28", "motivation": "political"}, {"id": "big-tech-inauguration-donations-praise-2025-01", "date": "2025-01-07", "date_end": "2025-01-20", "title": "Big Tech donates $1M each to inauguration fund and publicly praises Trump — antitrust cases pending", "summary": "Meta, Amazon, Google, Microsoft, Apple (CEO Tim Cook personally), and OpenAI's Sam Altman each donated $1 million to Trump's inauguration fund. Amazon also streamed the ceremony on Prime (in-kind $1M). CEOs made public praise statements: Altman said 'President Trump will lead our country into the age of AI'; Microsoft CEO thanked Trump for 'putting policies in place for the US to lead in AI.' All of these companies faced or faced possible antitrust, regulatory, or tariff exposure under the new administration.", "categories": ["public_praise", "selling_access"], "status": NBC", "type": "news"}, {"title": "Tech moguls Altman, Bezos and Zuckerberg donate to Trump's inauguration fund", "url": "https://www.npr.org/2024/12/13/nx-s1-5227874/trump-bezos-zuckerberg-amazon-facebook-open-ai-meta-inauguration-fund", "date": "2024-12-13", "outlet": "NPR", "type": "news"}], "tags": ["public_praise", "big_tech", "inauguration", "antitrust", "Meta", "Google", "Amazon", "Apple", "OpenAI", "Microsoft"], "last_updated": "2026-03-28", "motivation": "both"}, {"id": "meta-zuckerberg-fact-checkers-antitrust-2025-01", "date": "2025-01-07", "date_end": "2025-11-18", "title": "Meta kills fact-checkers, pays Trump $25M, wins antitrust case — Zuckerberg courts Trump throughout", "summary": "On January 7, 2025 — two weeks before inauguration — Meta eliminated its US fact-checking program, drawing immediate praise from Trump ('Probably' responding to Trump's pressure, Trump said). Meta also paid Trump $25M to settle his lawsuit over the post-Jan.6 Facebook suspension. Meta then won a landmark FTC antitrust case in November 2025. Trump said he'd 'probably' influenced Zuckerberg's fact-checker decision. Zuckerberg visited Mar-a-Lago to lobby Trump directly and donated $1M to the inauguration.", "categories": ["public_praise", "selling_access", "power_abuse"], "status": "confirmed", "beneficiary": ["trump_personally", "trump_pac"], "counterparty": {"name": "Meta / Mark Zuckerberg", "type": "domestic_company", "country": "US", "description": "Meta faced active FTC antitrust suit over Instagram and WhatsApp acquisitions; Zuckerberg pursued comprehensive appeasement strategy"}, "actors": ["Mark Zuckerberg", "Meta", "Donald Trump", "FTC"], "amount_usd": 26000000, "amount_note": "$25M settlement of Trump's Facebook ban lawsuit + $1M inauguration donation = $26M total to Trump", "financial_connection": {"exists": true, "description": "$25M paid directly to Trump personally (lawsuit settlement). Meta won landmark antitrust ruling in November 2025 after year of courting Trump."}, "quid_pro_quo": {"alleged": true, "gave": "Favorable antitrust environment; FTC case effectively neutralized; no new content moderation mandates", "received": "$25M lawsuit settlement; $1M inauguration donation; fact-checker elimination (political win); public praise"}, "sources": [{"title": "Meta ends fact-checking, drawing praise from Trump", "url": "https://www.washingtonpost.com/technology/2025/01/07/meta-factchecking-zuckerberg/", "date": "2025-01-07", "outlet": "Washington Post", "type": "news"}, {"title": "Meta scraps fact-checking, brings back political content in latest Trump-friendly move", "url": "https://www.cnbc.com/2025/01/07/meta-eliminates-third-party-fact-checking-moves-to-community-notes.html", "date": "2025-01-07", "outlet": "CNBC", "type": "news"}, {"title": "Zuckerberg's Meta Triumphs Over Trump: antitrust win November 2025", "url": "https://www.bloomberg.com/news/newsletters/2025-11-18/zuckerberg-s-meta-triumphs-over-trump-evening-briefing-americas", "date": "2025-11-18", "outlet": "Bloomberg", "type": "news"}, {"title": "How CEOs deal with Trump: Praise, face time, remorse, and gifts made of gold all go a long way", "url": "https://fortune.com/2025/08/13/how-ceos-deal-with-trump-praise-face-time-remorse-and-gifts-made-of-gold-all-go-a-long-way-experience-shows/", "date": "2025-08-13", "outlet": "Fortune", "type": "news"}], "tags": ["public_praise", "Meta", "Zuckerberg", "antitrust", "fact_checkers", "settlement", "Mar_a_Lago"], "last_updated": "2026-03-28", "motivation": "both"}, {"id": "foreign-leaders-flattery-gifts-2025", "date": "2025-01-20", "date_end": null, "title": "Foreign leaders adopt 'flattery diplomacy' — gifts, Nobel nominations, golden crowns", "summary": "Foreign leaders systematically adopted flattery as a diplomatic tool to manage Trump. Notable gifts and acts of praise: Netanyahu brought Trump a letter nominating him for the Nobel Peace Prize ('well deserved, you should get it'); South Korea's President gave Trump a ident Juan Orlando Hernández, sentenced to 45 years in a New York federal court for helping drug cartels ship 400+ tons of cocaine to the US while accepting millions in bribes. Trump announced the pardon simultaneously with his endorsement of Nasry 'Tito' Asfura, the candidate of Hernández's National Party, in Honduran elections — directly linking clemency to foreign electoral influence. Honduras issued an Interpol red notice seeking Hernández's re-arrest. Bipartisan congressional resolutions condemned the pardon (H.Res. 929, S.Res. 530).", "categories": ["pardon_political", "power_abuse"], "status": "confirmed", "counterparty": {"name": "Juan Orlando Hernández", "type": "foreign_individual", "country": "HN", "description": "Former President of Honduras (2014–2022), convicted in US federal court of narco-trafficking and accepting cartel bribes"}, "beneficiary": ["trump_personally"], "actors": ["Juan Orlando Hernández", "Nasry 'Tito' Asfura", "Sinaloa cartel"], "amount_usd": null, "amount_note": "No direct financial benefit to Trump identified; political benefit through Honduran electoral influence", "financial_connection": {"exists": false, "description": "No identified financial payment to Trump or family"}, "quid_pro_quo": {"alleged": true, "gave": "Full pardon wiping 45-year drug trafficking sentence", "received": "Political influence — Trump endorsed Hernández's party's candidate in Honduran elections at the same moment the pardon was announced"}, "sources": [{"title": "Trump formally pardons former Honduran President Juan Orlando Hernández", "url": "https://www.cnn.com/2025/12/02/politics/juan-orlando-hernandez-pardon", "date": "2025-12-02", "outlet": "CNN", "type": "news"}, {"title": "Presidential Pardon of Former Honduran President Convicted of Drug Trafficking", "url": "https://www.congress.gov/crs-product/IN12621", "date": "2025-12-10", "outlet": "Congressional Research Service", "type": "congressional"}, {"title": "Juan Orlando Hernández Pardon: Implications for U.S. Foreign Policy", "url": "https://www.wola.org/analysis/juan-orlando-hernandez-pardon-implications-for-u-s-foreign-policy/", "date": "2025-12-05", "outlet": "WOLA", "type": "watchdog"}, {"title": "Honduras seeks arrest of ex-President Hernández after Trump pardon", "url": "https://www.npr.org/2025/12/09/g-s1-101277/honduras-seeks-arrest-hernandez-trump-pardon", "date": "2025-12-09", "outlet": "NPR", "type": "news"}], "tags": ["pardon", "Honduras", "drug_trafficking", "electoral_influence", "foreign_government", "cartels"], "last_updated": "2026-03-29", "motivation": "political"}, {"id": "trump-fraud-czar-hypocrisy-2026-03", "date": "2026-03-16", "date_end": null, "title": "Trump creates 'Fraud Czar' task force targeting immigrants while having pardoned 70+ convicted fraudsters", "summary": "Trump signed an executive order creating a 'Task Force to Eliminate Fraud' and named VP JD Vance 'Fraud Czar,' targeting immigrant fraud in Minnesota (mostly Somali-Americans) and California. The NYT and House Judiciary Democrats documented that Trump had simultaneously granted clemency to more than 70 people convicted of fraud, forgiving over $700M in fines and restitution — including the longest-ever Medicare fraud sentence (Lawrence Duran, $205M scheme commuted May 2025), and a $660M securities fraud (Trevor Milton). The fired pardon attorney Elizabeth Oyer said Trump pardons those 'he sees something of himself in — a wealthy, successful businessman.'", "categories": ["power_abuse", "retaliation_targeting"], "status": "confirmed", "counterparty": {"name": "Somali-American community (Minnesota)", "type": "other", "country": "US", "description": "Primary ethnic group targeted in Trump's selective anti-fraud enforcement; majority of MN fraud defendants are Somali-American"}, "beneficiary": ["trump_personally"], "actors": ["JD Vance", "Elizabeth Oyer", "Lawrence Duran", "Trevor Milton", "Philip Esformes"], "amount_usd": null, "amount_note": "Trump claims $19B in MN frau
